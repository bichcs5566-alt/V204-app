
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>v207 真自動更新版</title>
  <meta name="theme-color" content="#0b0f14" />
  <style>
    :root{
      --bg:#0b0f14; --panel:#121821; --panel2:#18212d; --text:#eaf1f7;
      --muted:#95a3b3; --line:#273242; --accent:#7cb7ff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:16px 14px 44px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
    .title{font-size:24px;font-weight:800;margin:2px 0 6px}
    .sub{color:var(--muted);font-size:13px;margin-bottom:12px;line-height:1.5}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:13px}
    .btn{appearance:none;border:none;background:var(--accent);color:#07111f;font-weight:800;border-radius:12px;padding:10px 12px;cursor:pointer}
    .btn.secondary{background:#223044;color:var(--text);border:1px solid var(--line)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .metric{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:12px}
    .metric .k{font-size:12px;color:var(--muted);margin-bottom:6px}
    .metric .v{font-size:20px;font-weight:800}
    input[type="text"], select{
      width:100%; padding:11px 12px; border-radius:12px; border:1px solid var(--line);
      background:#0f1520; color:var(--text); outline:none;
    }
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .hint{font-size:12px;color:var(--muted);line-height:1.6}
    .ok{color:#9cf0c8}.error{color:#ff9090;white-space:pre-wrap}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left}
    th{position:sticky;top:0;background:#111a25;color:#c7d2de}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
    canvas{width:100%;height:220px;background:#0c121b;border-radius:12px;border:1px solid var(--line);display:block}
    @media (max-width: 680px){ .grid,.filters{grid-template-columns:1fr} }
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">📱 v207 真自動更新版</div>
  <div class="sub">GitHub Actions 每天自動更新 repo 內 csv，手機端直接讀最新結果。</div>

  <div class="card">
    <h3>1. 固定網址設定</h3>
    <input id="baseUrlInput" type="text" placeholder="請輸入 Base URL">
    <div class="row" style="margin-top:12px">
      <button class="btn" id="saveBaseBtn">儲存網址</button>
      <button class="btn secondary" id="refreshBtn">立即更新</button>
    </div>
  </div>

  <div class="card">
    <h3>2. 自動更新與價格層</h3>
    <div class="filters">
      <div>
        <div class="hint">前端重抓頻率</div>
        <select id="autoRefreshSelect">
          <option value="0">關閉</option>
          <option value="1">每 1 分鐘</option>
          <option value="3">每 3 分鐘</option>
          <option value="5" selected>每 5 分鐘</option>
          <option value="10">每 10 分鐘</option>
          <option value="15">每 15 分鐘</option>
        </select>
      </div>
      <div>
        <div class="hint">價格層</div>
        <select id="priceTierSelect">
          <option value="all">全部</option>
          <option value="lt10">10 以下</option>
          <option value="10_30">10–30</option>
          <option value="30_50">30–50</option>
          <option value="50_100">50–100</option>
          <option value="100p">100 以上</option>
          <option value="unknown">未知</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>3. 系統狀態</h3>
    <div class="row">
      <div class="pill">版本：<strong>v207</strong></div>
      <div class="pill">Base URL：<strong id="baseUrlText">未設定</strong></div>
      <div class="pill">價格層：<strong id="priceTierText">全部</strong></div>
      <div class="pill">最後載入：<strong id="lastLoadedAt">-</strong></div>
      <div class="pill">最近自動更新：<strong id="lastAutoUpdateAt">-</strong></div>
    </div>
    <div id="changeHint" class="ok" style="margin-top:10px"></div>
    <div id="errorBox" class="error" style="margin-top:10px"></div>
  </div>

  <div class="card">
    <h3>4. 核心指標</h3>
    <div class="grid">
      <div class="metric"><div class="k">最新 NAV</div><div class="v" id="m_nav">-</div></div>
      <div class="metric"><div class="k">總報酬</div><div class="v" id="m_total">-</div></div>
      <div class="metric"><div class="k">Sharpe</div><div class="v" id="m_sharpe">-</div></div>
      <div class="metric"><div class="k">MDD</div><div class="v" id="m_mdd">-</div></div>
      <div class="metric"><div class="k">平均持股</div><div class="v" id="m_holdings">-</div></div>
      <div class="metric"><div class="k">平均曝險</div><div class="v" id="m_exposure">-</div></div>
    </div>
  </div>

  <div class="card">
    <h3>5. NAV 曲線</h3>
    <canvas id="navChart" width="860" height="220"></canvas>
  </div>

  <div class="card">
    <h3>6. 最近訊號</h3>
    <div class="table-wrap"><table id="signalTable"></table></div>
  </div>

  <div class="card">
    <h3>7. 最新持倉</h3>
    <div class="table-wrap"><table id="tradeTable"></table></div>
  </div>

  <div class="card">
    <h3>8. Tier 概覽</h3>
    <div class="table-wrap"><table id="tierOverviewTable"></table></div>
  </div>

  <div class="card">
    <h3>9. 自動更新紀錄</h3>
    <div class="table-wrap"><table id="updateLogTable"></table></div>
  </div>

  <div class="card">
    <h3>10. Summary 明細</h3>
    <div class="table-wrap"><table id="summaryTable"></table></div>
  </div>
</div>

<script>
let AUTO_TIMER = null;
let RAW_NAV = [], RAW_POS = [], RAW_SUM = [], RAW_TIER = [], RAW_LOG = [];

function parseCSV(text){
  const rows=[]; let row=[], cur="", inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch === '"'){
      if(inQuotes && next === '"'){ cur += '"'; i++; } else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes){
      row.push(cur); cur="";
    } else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && next === '\n') i++;
      row.push(cur);
      if(row.length > 1 || row[0] !== "") rows.push(row);
      row=[]; cur="";
    } else cur += ch;
  }
  if(cur.length || row.length){ row.push(cur); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).map(r => {
    const o={}; headers.forEach((h,i)=>o[h]=(r[i]??"").trim()); return o;
  });
}
function toNum(x){ const n = Number(String(x ?? "").replace(/,/g,"")); return Number.isFinite(n)?n:NaN; }
function fmtNum(x,d=2){ const n=toNum(x); return Number.isFinite(n)?n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}):"-"; }
function fmtPct(x,d=2){ const n=toNum(x); return Number.isFinite(n)?(n*100).toFixed(d)+"%":"-"; }
function safeDate(x){ return x ? String(x).slice(0,10) : "-"; }
function nowStamp(){ return new Date().toLocaleString(); }

function renderTable(id, rows){
  const el=document.getElementById(id);
  if(!rows?.length){ el.innerHTML="<tr><td>目前沒有資料</td></tr>"; return; }
  const cols=Object.keys(rows[0]);
  let html="<thead><tr>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr></thead><tbody>";
  for(const r of rows){ html += "<tr>"+cols.map(c=>`<td>${r[c] ?? ""}</td>`).join("")+"</tr>"; }
  html += "</tbody>";
  el.innerHTML=html;
}
function drawLineChart(canvasId, labels, values){
  const canvas=document.getElementById(canvasId), ctx=canvas.getContext("2d"), W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H); ctx.fillStyle="#0c121b"; ctx.fillRect(0,0,W,H);
  if(!values || values.length < 2){ ctx.fillStyle="#95a3b3"; ctx.font="14px sans-serif"; ctx.fillText("目前沒有足夠資料可畫圖",20,30); return; }
  const pad={l:42,r:12,t:16,b:26}, minV=Math.min(...values), maxV=Math.max(...values), range=(maxV-minV)||1;
  ctx.strokeStyle="#273242"; ctx.lineWidth=1;
  for(let i=0;i<4;i++){ const y=pad.t+(H-pad.t-pad.b)*(i/3); ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke(); }
  ctx.strokeStyle="#7cb7ff"; ctx.lineWidth=2.4; ctx.beginPath();
  values.forEach((v,i)=>{ const x=pad.l+(W-pad.l-pad.r)*(i/(values.length-1)); const y=H-pad.b-((v-minV)/range)*(H-pad.t-pad.b); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.stroke();
}
function setErr(msg){ document.getElementById("errorBox").textContent = msg || ""; }
function setChangeHint(msg){ document.getElementById("changeHint").textContent = msg || ""; }
function setBaseDisplay(base){ document.getElementById("baseUrlText").textContent = base || "未設定"; document.getElementById("baseUrlInput").value = base || ""; }
function priceTierLabel(v){
  return {all:"全部",lt10:"10 以下","10_30":"10–30","30_50":"30–50","50_100":"50–100","100p":"100 以上",unknown:"未知"}[v] || "全部";
}

function buildDashboard(navRows, posRows, sumRows){
  const summary = sumRows[0] || {};
  const latestNav = navRows[navRows.length-1] || {};

  document.getElementById("m_nav").textContent = fmtNum(latestNav.nav ?? summary.final_nav,0);
  document.getElementById("m_total").textContent = fmtPct(summary.total_return,2);
  document.getElementById("m_sharpe").textContent = fmtNum(summary.sharpe,2);
  document.getElementById("m_mdd").textContent = fmtPct(summary.mdd,2);
  document.getElementById("m_holdings").textContent = fmtNum(summary.avg_holdings,2);
  document.getElementById("m_exposure").textContent = fmtNum(summary.avg_exposure,2);
  document.getElementById("lastLoadedAt").textContent = localStorage.getItem("v207_loaded_at") || "-";

  drawLineChart("navChart", navRows.map(r=>safeDate(r.date)), navRows.map(r=>toNum(r.nav)).filter(Number.isFinite));

  const maxSignal = posRows?.length ? [...posRows].sort((a,b)=>String(a.signal_date||"").localeCompare(String(b.signal_date||""))).slice(-1)[0].signal_date : null;
  const signalRows = maxSignal ? posRows.filter(r=>r.signal_date===maxSignal) : [];
  renderTable("signalTable", signalRows.slice(0,50));

  const maxTrade = posRows?.length ? [...posRows].sort((a,b)=>String(a.trade_date||"").localeCompare(String(b.trade_date||""))).slice(-1)[0].trade_date : null;
  const tradeRows = maxTrade ? posRows.filter(r=>r.trade_date===maxTrade) : [];
  renderTable("tradeTable", tradeRows.slice(0,50));

  renderTable("summaryTable", [summary]);
  renderTable("tierOverviewTable", RAW_TIER.slice(0,20));
  renderTable("updateLogTable", RAW_LOG.slice(-20).reverse());
  if(RAW_LOG.length){
    document.getElementById("lastAutoUpdateAt").textContent = RAW_LOG[RAW_LOG.length-1]["updated_at_utc"] || "-";
  }
}

async function fetchText(url){
  const r = await fetch(url, {cache:"no-store"});
  if(!r.ok) throw new Error(`${url} 讀取失敗：HTTP ${r.status}`);
  return await r.text();
}
function csvSignature(sumText){ return btoa(unescape(encodeURIComponent(sumText))).slice(0,80); }

async function refreshFromUrl(auto=false){
  setErr("");
  const base = (localStorage.getItem("v207_base_url") || "").trim().replace(/\/+$/,'');
  setBaseDisplay(base);
  if(!base){ setErr("請先設定 Base URL。"); return; }

  const tier = localStorage.getItem("v207_price_tier") || "all";

  try{
    const navText = await fetchText(base + "/v202_nav.csv");
    const sumText = await fetchText(base + "/v202_summary.csv");

    let posFile = "tier_all_positions.csv";
    if(tier !== "all"){ posFile = `tier_${tier}_positions.csv`; }

    let posText = "";
    try { posText = await fetchText(base + "/" + posFile); }
    catch(_) { posText = await fetchText(base + "/v202_positions.csv"); }

    let tierText = "";
    let logText = "";
    try { tierText = await fetchText(base + "/tier_overview_summary.csv"); } catch(_) { tierText = ""; }
    try { logText = await fetchText(base + "/update_log.csv"); } catch(_) { logText = ""; }

    const oldSig = localStorage.getItem("v207_summary_sig") || "";
    const newSig = csvSignature(sumText);

    RAW_NAV = parseCSV(navText);
    RAW_POS = parseCSV(posText);
    RAW_SUM = parseCSV(sumText);
    RAW_TIER = tierText ? parseCSV(tierText) : [];
    RAW_LOG = logText ? parseCSV(logText) : [];

    localStorage.setItem("v207_nav_text", navText);
    localStorage.setItem("v207_pos_text", posText);
    localStorage.setItem("v207_sum_text", sumText);
    localStorage.setItem("v207_tier_text", tierText);
    localStorage.setItem("v207_log_text", logText);
    localStorage.setItem("v207_summary_sig", newSig);
    localStorage.setItem("v207_loaded_at", nowStamp());

    document.getElementById("priceTierText").textContent = priceTierLabel(tier);
    buildDashboard(RAW_NAV, RAW_POS, RAW_SUM);

    if(oldSig && oldSig !== newSig){
      setChangeHint("偵測到新資料，且後端自動更新已生效。");
    }else{
      setChangeHint(auto ? "自動檢查完成，暫無新變化。" : "資料已同步，暫無新變化。");
    }
  }catch(err){
    setErr("自動抓取失敗：\n" + err.message);

    const navText = localStorage.getItem("v207_nav_text");
    const posText = localStorage.getItem("v207_pos_text");
    const sumText = localStorage.getItem("v207_sum_text");
    const tierText = localStorage.getItem("v207_tier_text");
    const logText = localStorage.getItem("v207_log_text");

    if(navText && posText && sumText){
      RAW_NAV = parseCSV(navText);
      RAW_POS = parseCSV(posText);
      RAW_SUM = parseCSV(sumText);
      RAW_TIER = tierText ? parseCSV(tierText) : [];
      RAW_LOG = logText ? parseCSV(logText) : [];
      document.getElementById("priceTierText").textContent = priceTierLabel(tier);
      buildDashboard(RAW_NAV, RAW_POS, RAW_SUM);
    }
  }
}

function saveBaseUrl(){
  const v = document.getElementById("baseUrlInput").value.trim();
  localStorage.setItem("v207_base_url", v);
  setBaseDisplay(v);
  setChangeHint("網址已儲存。");
}
function setupAutoRefresh(){
  if(AUTO_TIMER) clearInterval(AUTO_TIMER);
  const v = localStorage.getItem("v207_auto_refresh") || "5";
  document.getElementById("autoRefreshSelect").value = v;
  if(v !== "0"){
    AUTO_TIMER = setInterval(() => refreshFromUrl(true), Number(v) * 60 * 1000);
  }
}

document.getElementById("saveBaseBtn").addEventListener("click", saveBaseUrl);
document.getElementById("refreshBtn").addEventListener("click", () => refreshFromUrl(false));
document.getElementById("autoRefreshSelect").addEventListener("change", (e)=>{
  localStorage.setItem("v207_auto_refresh", e.target.value);
  setupAutoRefresh();
});
document.getElementById("priceTierSelect").addEventListener("change", (e)=>{
  localStorage.setItem("v207_price_tier", e.target.value);
  refreshFromUrl(false);
});

setBaseDisplay(localStorage.getItem("v207_base_url") || "");
document.getElementById("priceTierSelect").value = localStorage.getItem("v207_price_tier") || "all";
setupAutoRefresh();

const navText = localStorage.getItem("v207_nav_text");
const posText = localStorage.getItem("v207_pos_text");
const sumText = localStorage.getItem("v207_sum_text");
const tierText = localStorage.getItem("v207_tier_text");
const logText = localStorage.getItem("v207_log_text");
if(navText && posText && sumText){
  RAW_NAV = parseCSV(navText);
  RAW_POS = parseCSV(posText);
  RAW_SUM = parseCSV(sumText);
  RAW_TIER = tierText ? parseCSV(tierText) : [];
  RAW_LOG = logText ? parseCSV(logText) : [];
  buildDashboard(RAW_NAV, RAW_POS, RAW_SUM);
}
</script>
</body>
</html>
