<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日操作介面</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>📊 每日操作介面</h1>
    <p id="update-time">資料載入中...</p>

    <div class="section">
      <h2>📌 今日操作</h2>
      <table id="trade-table">
        <thead>
          <tr>
            <th>動作</th>
            <th>股票</th>
            <th>目標權重</th>
            <th>建議金額</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>📦 持倉</h2>
      <table id="position-table">
        <thead>
          <tr>
            <th>股票</th>
            <th>股數</th>
            <th>成本</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>📈 績效摘要</h2>
      <table id="summary-table">
        <thead>
          <tr>
            <th>報酬</th>
            <th>最大回撤</th>
            <th>Sharpe</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="footer">
      <button onclick="location.reload()">🔄 重新整理</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
