<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日操作介面</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="top">
      <h1>📊 每日操作介面</h1>
      <div id="update-time" class="muted">資料載入中...</div>
    </div>

    <div class="card">
      <h2>價格分層</h2>
      <select id="tierFilter">
        <option value="全部">全部</option>
        <option value="50以下">50以下</option>
        <option value="50-100">50-100</option>
        <option value="100-300">100-300</option>
        <option value="300-500">300-500</option>
        <option value="500-1000">500-1000</option>
        <option value="1000以上">1000以上</option>
      </select>

      <h2>自選股新增</h2>
      <div class="row">
        <input id="watchInput" type="text" placeholder="輸入股票代號，例如 2330" />
        <button id="addWatchBtn" type="button">新增</button>
      </div>

      <h2>自選股名單</h2>
      <div id="watchList" class="watch-tags"></div>

      <div class="row">
        <button id="refreshBtn" type="button">🔄 重新整理</button>
      </div>
    </div>

    <div class="card">
      <h2>📌 今日操作</h2>
      <table id="trade-table">
        <thead>
          <tr>
            <th>動作</th>
            <th>股票</th>
            <th>價格分層</th>
            <th>參考價格</th>
            <th>目標權重</th>
            <th>建議金額</th>
            <th>備註</th>
            <th>持倉同步</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>📦 持倉</h2>
      <table id="position-table">
        <thead>
          <tr>
            <th>股票</th>
            <th>股數</th>
            <th>成本</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>🛰️ 自選股監控</h2>
      <table id="watchlist-monitor-table">
        <thead>
          <tr>
            <th>股票</th>
            <th>價格分層</th>
            <th>參考價格</th>
            <th>持有狀態</th>
            <th>策略池</th>
            <th>動作</th>
            <th>損益%</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>📈 績效摘要</h2>
      <table id="summary-table">
        <thead>
          <tr>
            <th>報酬</th>
            <th>最大回撤</th>
            <th>Sharpe</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>🧪 篩選除錯</h2>
      <table id="debug-table">
        <thead>
          <tr>
            <th>輸入檔數</th>
            <th>有效檔數</th>
            <th>Core原始</th>
            <th>Alpha原始</th>
            <th>Core最終</th>
            <th>Alpha最終</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
