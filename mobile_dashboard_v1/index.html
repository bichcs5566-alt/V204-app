<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易操作介面 v266.5</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

<h2>📌 今日操作</h2>
<table id="trade">
<thead><tr>
<th>動作</th><th>股票</th><th>價格分層</th><th>價格</th><th>權重</th><th>金額</th><th>加入持倉</th>
</tr></thead>
<tbody></tbody>
</table>

<h2>📦 持倉監控</h2>
<div class="row">
<input id="pos_code" placeholder="股票代號">
<input id="pos_shares" placeholder="股數">
<input id="pos_cost" placeholder="成本">
<button onclick="addPosition()">新增</button>
</div>
<table id="pos">
<thead><tr>
<th>股票</th><th>動作</th><th>移除</th>
</tr></thead>
<tbody></tbody>
</table>

<h2>🛰 自選股監控</h2>
<div class="row">
<input id="watch_code" placeholder="股票代號">
<button onclick="addWatch()">新增</button>
</div>
<table id="watch">
<thead><tr>
<th>股票</th><th>狀態</th><th>移除</th>
</tr></thead>
<tbody></tbody>
</table>

</div>
<script src="app.js"></script>
</body>
</html>
