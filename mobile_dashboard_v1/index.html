<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>每日操作介面</title>
  <style>
    :root{
      --bg:#f4f1ec;
      --card:#ffffff;
      --text:#121827;
      --muted:#667085;
      --line:#e6e8ee;
      --blue:#253b68;
      --green:#dff7e5;
      --orange:#fff0d6;
      --yellow:#fff8d6;
      --gray:#f1f3f6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif;
      padding:18px 14px 40px;
    }
    .wrap{max-width:760px;margin:0 auto}
    section{
      background:var(--card);
      border-radius:26px;
      padding:20px;
      margin:16px 0;
      box-shadow:0 2px 14px rgba(16,24,40,.06);
    }
    h1{font-size:30px;margin:0 0 18px;font-weight:900}
    h2{font-size:24px;margin:0 0 14px;font-weight:900}
    .meta-grid,.stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .meta-grid div,.stat-grid div{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      min-height:62px;
    }
    b{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
    span{font-size:16px;font-weight:700}
    .table-head{
      display:grid;
      grid-template-columns:92px 76px 86px 86px 70px 96px;
      gap:8px;
      padding:12px 10px;
      background:#f8fafc;
      border-radius:18px;
      font-weight:900;
      color:#1d2939;
      min-width:620px;
    }
    .scroll{overflow-x:auto}
    .trade-row{
      display:grid;
      grid-template-columns:92px 76px 86px 86px 70px 96px;
      gap:8px;
      align-items:center;
      min-width:620px;
      padding:14px 10px;
      border-bottom:1px solid var(--line);
    }
    .action-pill{
      border-radius:999px;
      padding:8px 10px;
      text-align:center;
      font-weight:900;
      white-space:nowrap;
    }
    .buy .action-pill{background:var(--green);color:#097a2a}
    .test .action-pill{background:var(--orange);color:#9a5a00}
    .watch .action-pill{background:var(--yellow);color:#7a6500}
    .none .action-pill,.skip .action-pill{background:var(--gray);color:#667085}
    .stock-id{font-size:20px;font-weight:900}
    .price-tier,.ref-price,.score,.amount{font-size:17px;font-weight:700}
    .sub,.note{
      grid-column:1 / -1;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
      padding-left:4px;
    }
    .note{color:#344054}
    .empty{
      padding:24px;
      background:#f8fafc;
      border-radius:18px;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }
    .empty-title{font-size:28px;font-weight:900;color:var(--text);margin-bottom:6px}
    .small{font-size:15px;padding:14px}
    .candidate-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
    }
    .candidate-row span{font-size:15px}
    @media (max-width:520px){
      body{padding:12px 10px 32px}
      section{padding:18px;margin:14px 0;border-radius:24px}
      h1{font-size:28px}
      h2{font-size:23px}
      .meta-grid,.stat-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="meta-card"></section>

    <section>
      <h2>📌 今日操作</h2>
      <div class="scroll">
        <div class="table-head">
          <div>動作</div>
          <div>股票</div>
          <div>價格分層</div>
          <div>參考價</div>
          <div>分數</div>
          <div>建議金額</div>
        </div>
        <div id="today-action"></div>
      </div>
    </section>

    <section id="stats"></section>
    <section id="core-list"></section>
    <section id="alpha-list"></section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
