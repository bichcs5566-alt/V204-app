<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日操作介面</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>📊 每日操作介面</h1>
  <div id="dataStatus">
    <div>最後更新：<span id="lastUpdate">--</span></div>
    <div>訊號日：<span id="signalDate">--</span></div>
    <div>交易日：<span id="tradeDate">--</span></div>
    <div>資料狀態：<span id="dataState">讀取中...</span></div>
  </div>
  <button onclick="reloadData()">🔄 重新整理</button>
</div>

<div class="card">
  <h2>📌 今日操作</h2>
  <table id="tradeTable"></table>
</div>

<div class="card">
  <h2>📦 持倉監控</h2>
  <input id="stockInput" placeholder="輸入股票代號">
  <input id="qtyInput" placeholder="股數">
  <input id="costInput" placeholder="成本">
  <button onclick="addPosition()">加入持倉</button>
  <table id="positionTable"></table>
</div>

<div class="card">
  <h2>📡 自選股監控</h2>
  <input id="watchInput" placeholder="輸入股票代號">
  <button onclick="addWatch()">加入監控</button>
  <table id="watchTable"></table>
</div>

<script src="app.js"></script>
</body>
</html>
