name: run-v229-1

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v229_1_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: |
            v229_1_nav.csv
            v229_1_summary.csv
