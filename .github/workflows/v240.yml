name: run-v240

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy yfinance

      - run: python v235_macro_updater.py
      - run: python v240_main.py

      - name: Check output files
        run: |
          ls -lah
          test -f macro_signal.csv
          test -f v240_nav.csv
          test -f v240_trades.csv
          test -f v240_holdings.csv
          test -f v240_summary.csv

      - uses: actions/upload-artifact@v4
        with:
          name: v240_result
          path: |
            macro_signal.csv
            v240_nav.csv
            v240_trades.csv
            v240_holdings.csv
            v240_summary.csv
