name: repair_data_link

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Import existing 10y price panel
        run: |
          python import_existing_price_panel.py

      - name: Backfill missing days
        run: |
          python backfill_missing_days.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Sync dashboard
        run: |
          if [ -f v3_1_dashboard_bridge.py ]; then
            python v3_1_dashboard_bridge.py
          else
            echo "bridge not found, skip"
          fi

      - name: Commit repaired data layer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            price_panel_daily.csv \
            feature_panel_daily.csv \
            data_meta.json \
            feature_meta.json \
            data_guard_report.json \
            backfill_report.json \
            trade_plan.csv \
            candidates.csv \
            core_candidates.csv \
            alpha_candidates.csv \
            selection_debug.csv \
            meta.json \
            mobile_dashboard_v1/data/ || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "repair data link and backfill missing days"
            git push
          fi
