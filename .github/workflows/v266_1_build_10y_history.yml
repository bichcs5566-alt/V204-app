name: v266_1_build_10y_history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Build 10y price panel
        run: |
          python v266_1_build_price_panel_10y.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Commit 10y data layer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            raw_market_daily.csv \
            price_panel_daily.csv \
            feature_panel_daily.csv \
            data_meta.json \
            feature_meta.json \
            data_guard_report.json \
            mobile_dashboard_v1/data/ || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v266.1 rebuild 10y data layer"
            git push
          fi
