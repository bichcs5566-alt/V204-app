name: run-v230-2

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v230_2_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: |
            v230_2_nav.csv
            v230_2_summary.csv
