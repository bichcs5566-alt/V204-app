steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install deps
    run: pip install pandas

  - name: Run position overlay
    run: python position_overlay_engine.py

  - name: Commit overlay result
    run: |
      git config --global user.name "actions-user"
      git config --global user.email "actions@github.com"

      git add position_overlay.csv || true
      git add mobile_dashboard_v1/data/position_overlay.csv || true
      git add mobile_dashboard_v1/data/position_overlay_summary.txt || true

      git commit -m "update position overlay" || echo "no changes"

  - name: Push
    run: |
      git push
