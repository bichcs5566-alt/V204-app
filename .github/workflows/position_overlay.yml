name: POSITION OVERLAY v26625 STABLE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overlay:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run position overlay engine
        run: |
          python position_overlay_engine.py

      - name: Commit overlay result
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"

          git add position_overlay.csv || true
          git add mobile_dashboard_v1/data/position_overlay.csv || true
          git add mobile_dashboard_v1/data/position_overlay_summary.txt || true

          git commit -m "update position overlay v26625" || echo "no changes to commit"

      - name: Push changes
        run: |
          git push
