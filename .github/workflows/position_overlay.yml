name: POSITION OVERLAY v26625

on:
  workflow_dispatch:

jobs:
  overlay:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas

      - run: python position_overlay_engine.py

      - run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update overlay" || echo "no change"
          git push
