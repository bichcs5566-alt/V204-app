name: v218

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install pandas numpy

      - name: Run v218
        run: |
          python v218_decision_engine.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add v218_*.csv v218_*.txt || true
          git commit -m "run v218 decision engine" || echo "no changes"
          git push
