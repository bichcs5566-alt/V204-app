name: v258-extreme-strength-engine

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Merge price panel
        run: |
          python merge_chunked_price_panel.py

      - name: Run backtest
        run: |
          python v258_extreme_strength_engine.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v258-results
          path: |
            daily_nav.csv
            full_summary.csv
