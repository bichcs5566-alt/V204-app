name: run-v241-6

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy yfinance

      - run: python v235_macro_updater.py
      - run: python v241_6_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: v241_6_result
          path: |
            v241_6_nav.csv
            v241_6_trades.csv
            v241_6_summary.csv
