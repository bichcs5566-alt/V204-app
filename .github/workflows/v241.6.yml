name: run-v241-6

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files (DEBUG)
        run: ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance

      - name: Run macro updater
        run: python v235_macro_updater.py

      - name: Run strategy
        run: |
          if [ -f v241_5_main.py ]; then
            python v241_5_main.py
          else
            echo "❌ 找不到 v241_5_main.py"
            exit 1
          fi

      - name: Check outputs
        run: |
          ls -lah
          test -f v241_5_nav.csv
          test -f v241_5_summary.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v241_6_result
          path: |
            v241_5_nav.csv
            v241_5_trades.csv
            v241_5_summary.csv
