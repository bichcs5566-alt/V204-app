# v222_workflow.yml
name: v222_auto_pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * 1-5"

permissions:
  contents: write

jobs:
  run-v222:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow

      - name: Run v222
        run: |
          python v222_auto_pipeline.py

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v222_outputs
          path: |
            v222_signal_log.csv
            v222_positions.csv
            v222_daily_nav.csv
            v222_summary.csv
            v222_trade_stats.csv
            v222_window_summary.csv
          if-no-files-found: error

      - name: Commit CSV outputs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v222_*.csv
          git diff --cached --quiet || git commit -m "update v222 outputs"
          git push
