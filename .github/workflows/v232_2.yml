name: run-v232-2

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v231_2_macro_updater.py
      - run: python v232_2_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: v232_2_result
          path: |
            v232_2_nav.csv
            v232_2_summary.csv
