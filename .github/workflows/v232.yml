name: run-v232

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      # macro 仍沿用 v231.2
      - run: python v231_2_macro_updater.py

      - run: python v232_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: v232_result
          path: |
            v232_nav.csv
            v232_summary.csv
