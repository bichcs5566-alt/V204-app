name: v266-9A-position-writeback

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: "upsert or delete"
        required: true
        type: string
      stock_id:
        description: "stock id"
        required: true
        type: string
      shares:
        description: "shares"
        required: false
        type: string
      avg_cost:
        description: "avg cost"
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip

      - name: Run position writeback
        env:
          ACTION_TYPE: ${{ github.event.inputs.action_type }}
          STOCK_ID: ${{ github.event.inputs.stock_id }}
          SHARES: ${{ github.event.inputs.shares }}
          AVG_COST: ${{ github.event.inputs.avg_cost }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python v266_9A_position_writeback.py
