name: v243-engine-strict-no-lookahead

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        test_case:
          - label: y2022
            start: "2022-01-01"
            end: "2022-12-31"
          - label: y2023
            start: "2023-01-01"
            end: "2023-12-31"
          - label: y2024
            start: "2024-01-01"
            end: "2024-12-31"
          - label: y2025
            start: "2025-01-01"
            end: "2025-12-31"
          - label: full
            start: "2022-01-01"
            end: "2025-12-31"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Merge price panel
        run: |
          python merge_chunked_price_panel.py

      - name: Build macro if missing
        run: |
          if [ ! -f macro_signal.csv ]; then
            python v235_macro_updater.py
          fi

      - name: Run backtest
        run: |
          python v243_engine_strict_no_lookahead.py \
            --start "${{ matrix.test_case.start }}" \
            --end "${{ matrix.test_case.end }}" \
            --label "${{ matrix.test_case.label }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: strict_${{ matrix.test_case.label }}
          path: |
            ${{ matrix.test_case.label }}_summary.csv
            ${{ matrix.test_case.label }}_nav.csv
            ${{ matrix.test_case.label }}_trades.csv
            ${{ matrix.test_case.label }}_signals.csv
            ${{ matrix.test_case.label }}_meta.json
