# v263_3_engine.yml.txt
name: v263-3-stability-engine

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python merge_chunked_price_panel.py

      - run: python v263_3_engine.py

      - uses: actions/upload-artifact@v4
        with:
          name: v263_3-results
          path: |
            daily_nav.csv
            full_summary.csv
