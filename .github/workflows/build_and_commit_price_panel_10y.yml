name: build-and-commit-price-panel-10y

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check builder exists
        run: |
          test -f build_full_price_panel_10y.py || (echo "Missing build_full_price_panel_10y.py" && exit 1)

      - name: Build full 10y price panel
        run: |
          python build_full_price_panel_10y.py

      - name: Check build outputs
        run: |
          ls -lah
          test -f price_panel_daily.csv || (echo "Missing price_panel_daily.csv" && exit 1)
          test -f build_price_panel_summary.csv || (echo "Missing build_price_panel_summary.csv" && exit 1)
          test -f build_price_panel_log.txt || (echo "Missing build_price_panel_log.txt" && exit 1)

      - name: Commit generated files back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python commit_generated_price_panel.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: price_panel_10y_committed_result
          path: |
            price_panel_daily.csv
            build_price_panel_summary.csv
            build_price_panel_log.txt
            symbol_universe.csv
