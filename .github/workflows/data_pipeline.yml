      # v266.59：資料來源唯一鎖死。
      # final_action 只能來自「當次 run + 真同步持倉」；沒有同步持倉就清空 final_action 與 position_overlay。
      - name: v266.59 single source lock final action and positions
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import json
          import pandas as pd

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)

          RUN_ID = "${{ github.run_number }}"
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          def read_csv_safe(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def norm_sid(v):
              import re
              s = "" if v is None else str(v)
              m = re.search(r"(\d{4})", s)
              return m.group(1) if m else ""

          def quantity_series(df):
              for c in ["shares", "qty", "股數", "lots"]:
                  if c in df.columns:
                      return pd.to_numeric(df[c].fillna("0").map(str).str.replace(",", "", regex=False), errors="coerce").fillna(0)
              return pd.Series([0] * len(df), index=df.index)

          def true_position_ids():
              ids = set()
              # 真同步持倉只看手動/目前持倉，不拿 position_overlay 當來源，避免殭屍持倉復活。
              for name in ["manual_positions.csv", "current_positions.csv"]:
                  for base in [ROOT, DATA]:
                      df = read_csv_safe(base / name)
                      if df.empty:
                          continue
                      q = quantity_series(df)
                      valid = df.loc[q > 0].copy()
                      if valid.empty:
                          continue
                      code_col = None
                      for c in ["stock_id", "code", "股票代號"]:
                          if c in valid.columns:
                              code_col = c
                              break
                      if code_col:
                          ids.update(norm_sid(x) for x in valid[code_col].tolist() if norm_sid(x))
              return ids

          active_ids = true_position_ids()

          final_names = ["final_action_plan.csv", "trade_plan.csv"]
          position_names = ["position_overlay.csv", "position_monitor.csv"]

          if not active_ids:
              # 無真持倉：final 與 overlay 全部鎖空，避免舊資料復活。
              for name in final_names + position_names:
                  for base in [ROOT, DATA]:
                      p = base / name
                      p.parent.mkdir(parents=True, exist_ok=True)
                      pd.DataFrame().to_csv(p, index=False, encoding="utf-8-sig")
                      print("v266.59 emptied:", p)

              summary = {
                  "version": "v266.59",
                  "source": "v266_59_single_source_lock",
                  "run_source_lock": "v266.59_single_source_lock",
                  "run_id": RUN_ID,
                  "final_action_rows": 0,
                  "active_position_count": 0,
                  "active_position_ids": [],
                  "updated_at": now,
                  "timezone": "Asia/Taipei",
                  "message": "無真同步持倉，final_action 與 position_overlay 已強制清空。"
              }
              for p in [ROOT/"final_action_summary.json", DATA/"final_action_summary.json"]:
                  p.write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8-sig")

          else:
              # 有真持倉：final_action 只能保留 active_ids 內標的，並蓋上當次 run_id。
              for name in final_names:
                  for base in [ROOT, DATA]:
                      p = base / name
                      df = read_csv_safe(p)
                      if df.empty:
                          continue
                      code_col = None
                      for c in ["stock_id", "code", "股票代號"]:
                          if c in df.columns:
                              code_col = c
                              break
                      if code_col:
                          df["_sid_lock"] = df[code_col].map(norm_sid)
                          df = df[df["_sid_lock"].isin(active_ids)].drop(columns=["_sid_lock"], errors="ignore")
                      df["run_source_lock"] = "v266.59_single_source_lock"
                      df["run_id"] = RUN_ID
                      df["updated_at"] = now
                      df.to_csv(p, index=False, encoding="utf-8-sig")
                      print("v266.59 locked final:", p, len(df))

              # overlay 同樣只保留真持倉，防殭屍持倉。
              for name in position_names:
                  for base in [ROOT, DATA]:
                      p = base / name
                      df = read_csv_safe(p)
                      if df.empty:
                          continue
                      code_col = None
                      for c in ["stock_id", "code", "股票代號"]:
                          if c in df.columns:
                              code_col = c
                              break
                      if code_col:
                          df["_sid_lock"] = df[code_col].map(norm_sid)
                          df = df[df["_sid_lock"].isin(active_ids)].drop(columns=["_sid_lock"], errors="ignore")
                      df["run_source_lock"] = "v266.59_single_source_lock"
                      df["run_id"] = RUN_ID
                      df["updated_at"] = now
                      df.to_csv(p, index=False, encoding="utf-8-sig")
                      print("v266.59 locked positions:", p, len(df))
          PY


