name: data_pipeline

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 19:00（UTC 11:00）
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install pandas numpy requests

      # 🔥 1. 合併歷史資料（不commit大檔）
      - name: Merge price panel
        run: |
          python merge_price_panel_parts_runtime.py

      # 🔥 2. 抓今日資料（核心）
      - name: Update daily data
        run: |
          python backfill_missing_days.py

      # 🔥 3. 特徵
      - name: Build features
        run: |
          python v266_build_features.py

      # 🔥 4. 防呆
      - name: Data guard
        run: |
          python v266_data_guard.py

      # 🔥 5. 策略
      - name: Strategy
        run: |
          python v266_strategy_engine.py

      # 🔥 6. UI同步
      - name: Sync dashboard
        run: |
          python v3_1_dashboard_bridge.py || echo "skip"

      # ❌ 刪掉超大檔（避免100MB爆炸）
      - name: Clean big files
        run: |
          rm -f price_panel_daily.csv
          rm -f feature_panel_daily.csv

      # 🔥 只commit小檔（UI用）
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add \
            trade_plan.csv \
            core_candidates.csv \
            alpha_candidates.csv \
            mobile_dashboard_v1/data/*.csv \
            mobile_dashboard_v1/data/*.json || true

          if git diff --cached --quiet; then
            echo "no update"
          else
            git commit -m "auto update 19:00"
            git push
          fi
