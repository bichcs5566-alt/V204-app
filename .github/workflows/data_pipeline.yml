      - name: Final action last lock before commit
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import json
          import pandas as pd

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          def read_csv(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def norm(df):
              if df.empty:
                  return df
              df = df.copy()
              if "stock_id" in df.columns:
                  sid = df["stock_id"].astype(str).str.extract(r"(\d{4})", expand=False)
                  df["stock_id"] = sid.fillna(df["stock_id"].astype(str))
              return df

          def ids_from_positions(df):
              df = norm(df)
              if df.empty or "stock_id" not in df.columns:
                  return set()
              if "shares" in df.columns:
                  q = pd.to_numeric(df["shares"], errors="coerce").fillna(0)
                  df = df.loc[q > 0]
              return set(df["stock_id"].astype(str).str.extract(r"(\d{4})", expand=False).dropna().astype(str))

          active_ids = set()
          for name in ["manual_positions.csv", "current_positions.csv", "position_overlay.csv"]:
              active_ids |= ids_from_positions(read_csv(ROOT/name))
              active_ids |= ids_from_positions(read_csv(DATA/name))

          final = norm(read_csv(ROOT/"final_action_plan.csv"))
          if final.empty:
              final = norm(read_csv(DATA/"final_action_plan.csv"))

          if final.empty:
              final = pd.DataFrame(columns=["stock_id","stock_name","final_action","action","ref_price","reason","updated_at","refresh_mode"])
          else:
              def is_sell_row(r):
                  txt = " ".join(str(r.get(c, "")) for c in ["final_action","action","status","decision","reason","system_note"]).upper()
                  return any(x in txt for x in ["SELL","REDUCE","賣","賣出","出場","停損","減碼"])
              mask_sell = final.apply(is_sell_row, axis=1)
              if active_ids:
                  final = pd.concat([
                      final.loc[mask_sell & final["stock_id"].astype(str).isin(active_ids)],
                      final.loc[~mask_sell]
                  ], ignore_index=True)
              else:
                  final = final.loc[~mask_sell].copy()

          final["updated_at"] = now
          final["refresh_mode"] = "behavior_interpretation"
          # v266.59：final_action 也補行為判讀欄位。
          if "behavior_hint" not in final.columns:
              final["behavior_hint"] = "⚪ 行為中性（依策略判斷）"
          if "behavior_confidence" not in final.columns:
              final["behavior_confidence"] = "中低"
          if "behavior_action_hint" not in final.columns:
              final["behavior_action_hint"] = "目前訊號不夠明確，依原策略與風控執行。"
          for p in [ROOT/"final_action_plan.csv", DATA/"final_action_plan.csv"]:
              final.to_csv(p, index=False, encoding="utf-8-sig")

          summary = {}
          for p in [ROOT/"final_action_summary.json", DATA/"final_action_summary.json"]:
              if p.exists():
                  try:
                      summary = json.loads(p.read_text(encoding="utf-8-sig"))
                      break
                  except Exception:
                      pass
          summary.update({
              "version": "v266.59",
              "source": "v266_59_single_source_lock",
              "refresh_mode": "behavior_interpretation",
              "active_position_ids": sorted(active_ids),
              "final_action_rows": int(len(final)),
              "final_action_updated_at": now,
              "updated_at": now,
              "timezone": "Asia/Taipei"
          })
          for p in [ROOT/"final_action_summary.json", DATA/"final_action_summary.json"]:
              p.write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8-sig")

          print("v266.59 final last lock rows =", len(final), "active_ids =", sorted(active_ids))
          PY



