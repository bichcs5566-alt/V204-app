      # 4. root 與 mobile_dashboard_v1/data 強制一致。
      - name: Lock final action source and remove stale symbols
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import json
          import pandas as pd
          import numpy as np

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          def read_csv(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def write_both(df, name):
              df = df.copy()
              if "updated_at" not in df.columns:
                  df["updated_at"] = now
              else:
                  df["updated_at"] = now
              df["refresh_mode"] = "behavior_interpretation"
              for p in [ROOT / name, DATA / name]:
                  p.parent.mkdir(parents=True, exist_ok=True)
                  df.to_csv(p, index=False, encoding="utf-8-sig")

          def sid_series(df):
              if df.empty or "stock_id" not in df.columns:
                  return pd.Series([], dtype=str)
              return df["stock_id"].astype(str).str.extract(r"(\d{4})", expand=False).dropna().astype(str)

          def norm_sid_df(df):
              if df.empty:
                  return df
              df = df.copy()
              if "stock_id" in df.columns:
                  sid = df["stock_id"].astype(str).str.extract(r"(\d{4})", expand=False)
                  df["stock_id"] = sid.fillna(df["stock_id"].astype(str))
              return df

          def action_text(row):
              vals = []
              for c in ["final_action","action","status","decision","side","持倉狀態"]:
                  if c in row:
                      vals.append(str(row.get(c, "")))
              return " ".join(vals).upper()

          # 本輪持倉來源：manual/current/position_overlay
          manual = norm_sid_df(read_csv(ROOT / "manual_positions.csv"))
          current = norm_sid_df(read_csv(ROOT / "current_positions.csv"))
          overlay = norm_sid_df(read_csv(ROOT / "position_overlay.csv"))

          active_position_ids = set()
          for df in [manual, current, overlay]:
              if df.empty:
                  continue
              if "shares" in df.columns:
                  qty = pd.to_numeric(df["shares"], errors="coerce").fillna(0)
              elif "股數" in df.columns:
                  qty = pd.to_numeric(df["股數"], errors="coerce").fillna(0)
              else:
                  qty = pd.Series([1]*len(df))
              ids = sid_series(df.loc[qty > 0] if len(qty)==len(df) else df)
              active_position_ids.update(ids.tolist())

          # 讀 final_action_plan；若沒有，用空表，不使用舊檔 fallback。
          final = norm_sid_df(read_csv(ROOT / "final_action_plan.csv"))
          if final.empty:
              final = norm_sid_df(read_csv(DATA / "final_action_plan.csv"))

          if final.empty:
              final = pd.DataFrame(columns=[
                  "stock_id","stock_name","final_action","action","ref_price","reason",
                  "updated_at","refresh_mode"
              ])

          # 分離 SELL 與非 SELL
          if not final.empty:
              final["_action_text"] = final.apply(action_text, axis=1)
              is_sell = final["_action_text"].str.contains("SELL|賣|出場|停損|REDUCE|減碼", regex=True, na=False)
              sell_rows = final[is_sell].copy()
              other_rows = final[~is_sell].copy()

              # 無持倉：賣出不能保留；有持倉：只保留本輪持倉內的賣出。
              if active_position_ids:
                  sell_rows = sell_rows[sell_rows["stock_id"].astype(str).isin(active_position_ids)]
              else:
                  sell_rows = sell_rows.iloc[0:0]

              # 非 SELL 也過濾舊資料：只保留有本輪來源註記或不是舊策略出場的列。
              final = pd.concat([sell_rows, other_rows], ignore_index=True)
              final.drop(columns=["_action_text"], inplace=True, errors="ignore")

          # 若 final 仍是舊賣出且無持倉，會變空，避免前端看見舊標的。
          # 如果你要「最終操作」顯示新進標的，後續可以再把 TEST/BUY 推進 final。
          write_both(final, "final_action_plan.csv")

          # 更新 summary
          def read_json(p):
              p = Path(p)
              if not p.exists():
                  return {}
              try:
                  return json.loads(p.read_text(encoding="utf-8-sig"))
              except Exception:
                  try:
                      return json.loads(p.read_text(encoding="utf-8"))
                  except Exception:
                      return {}

          summary = read_json(ROOT / "final_action_summary.json") or read_json(DATA / "final_action_summary.json")
          summary.update({
              "version": "v266.59",
              "source": "v266_59_single_source_lock",
              "refresh_mode": "behavior_interpretation",
              "final_action_rows": int(len(final)),
              "active_position_count": int(len(active_position_ids)),
              "active_position_ids": sorted(active_position_ids),
              "final_action_updated_at": now,
              "updated_at": now,
              "timezone": "Asia/Taipei",
          })
          for p in [ROOT/"final_action_summary.json", DATA/"final_action_summary.json"]:
              p.write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8-sig")

          print("v266.59 final source locked")
          print("active_position_ids =", sorted(active_position_ids))
          print("final_action_rows =", len(final))
          PY


