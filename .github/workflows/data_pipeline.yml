      - name: Lock dashboard display fields
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import pandas as pd
          import numpy as np

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          INVALID = {"", "--", "-", "nan", "NaN", "None", "none", "null", "undefined", "資料不足", "資料有限", "N/A"}

          def read_csv_safe(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def txt(v, default=""):
              try:
                  if v is None or pd.isna(v):
                      return default
                  s = str(v).strip()
                  return default if s in INVALID else s
              except Exception:
                  return default

          def num(v):
              try:
                  return float(str(v).replace(",", ""))
              except Exception:
                  return np.nan

          def sid_norm(df):
              if df.empty or "stock_id" not in df.columns:
                  return df
              df = df.copy()
              sid = df["stock_id"].astype(str).str.extract(r"(\d{4})", expand=False)
              df["stock_id"] = sid.fillna(df["stock_id"].astype(str))
              return df

          def ma_label(row, key, label):
              for c in [f"{key}_label", f"{key}_status", f"{label}觀察"]:
                  v = txt(row.get(c, ""), "")
                  if v:
                      return v
              close = num(row.get("close", row.get("ref_price", row.get("price", ""))))
              ma = num(row.get(key, ""))
              if np.isfinite(close) and np.isfinite(ma) and ma > 0:
                  if close >= ma * 1.01:
                      return f"{label}：站上｜↑ 強勢"
                  if close <= ma * 0.99:
                      return f"{label}：跌破｜↓ 轉弱"
                  return f"{label}：貼近｜→ 盤整"
              context = " ".join([txt(row.get(c, ""), "") for c in ["final_action","action","status","reason","system_note"]])
              if any(x in context for x in ["SELL","賣","停損","跌破","出場"]):
                  return f"{label}：依出場風控判斷"
              if any(x in context for x in ["TEST","BUY","試單","突破","強勢"]):
                  return f"{label}：依試單節奏判斷"
              if any(x in context for x in ["WATCH","觀察","整理","收斂"]):
                  return f"{label}：依觀察節奏判斷"
              return f"{label}：依策略判斷"

          def kbar(row):
              for c in ["kbar_type","k_bar_type","exit_kbar_type","出場K棒型態"]:
                  v = txt(row.get(c, ""), "")
                  if v:
                      return v
              context = " ".join([txt(row.get(c, ""), "") for c in ["final_action","action","status","reason","system_note"]])
              if any(x in context for x in ["SELL","賣","停損","跌破","出場"]):
                  return "跌破型K棒"
              if any(x in context for x in ["TEST","BUY","試單","突破","強勢"]):
                  return "突破確認K"
              if any(x in context for x in ["WATCH","觀察","整理","收斂"]):
                  return "整理觀察K"
              return "依策略判斷K"

          def kstruct(row):
              for c in ["k_structure","kline_structure","K線結構"]:
                  v = txt(row.get(c, ""), "")
                  if v:
                      return v
              close = num(row.get("close", row.get("ref_price", row.get("price", ""))))
              ma5 = num(row.get("ma5", "")); ma10 = num(row.get("ma10", "")); ma20 = num(row.get("ma20", ""))
              if all(np.isfinite(x) for x in [close, ma5, ma10, ma20]):
                  if ma5 > ma10 and ma10 > ma20 and close > ma20:
                      return "多頭排列"
                  if ma5 < ma10 and ma10 < ma20 and close < ma20:
                      return "空頭排列"
                  if close > ma20 and ma5 >= ma10:
                      return "整理後轉強"
                  if close < ma20:
                      return "短線轉弱"
                  return "震盪整理"
              context = " ".join([txt(row.get(c, ""), "") for c in ["final_action","action","status","reason","system_note"]])
              if any(x in context for x in ["SELL","賣","停損","跌破","出場"]):
                  return "短線轉弱"
              if any(x in context for x in ["TEST","BUY","試單","突破","強勢"]):
                  return "整理後轉強"
              if any(x in context for x in ["WATCH","觀察","整理","收斂"]):
                  return "整理收斂"
              return "依策略結構"

          # build tech map from every candidate source
          tech_sources = []
          for name in ["candidates.csv","trade_plan.csv","final_action_plan.csv","position_overlay.csv","ignition_candidates.csv","strategy_evolution.csv"]:
              for p in [ROOT/name, DATA/name]:
                  df = sid_norm(read_csv_safe(p))
                  if not df.empty and "stock_id" in df.columns:
                      tech_sources.append(df)
          tech = pd.concat(tech_sources, ignore_index=True) if tech_sources else pd.DataFrame()
          tech = sid_norm(tech)
          if not tech.empty and "stock_id" in tech.columns:
              tech = tech.groupby("stock_id", as_index=False).agg(lambda s: next((txt(x, "") for x in s if txt(x, "")), ""))

          def lock_file(path):
              p = Path(path)
              df = sid_norm(read_csv_safe(p))
              if df.empty:
                  return
              if not tech.empty and "stock_id" in df.columns:
                  df = df.merge(tech, on="stock_id", how="left", suffixes=("", "_tech"))
                  for c in list(df.columns):
                      if c.endswith("_tech"):
                          base = c[:-5]
                          if base not in df.columns:
                              df[base] = df[c]
                          else:
                              left = df[base].map(lambda v: txt(v, ""))
                              right = df[c].map(lambda v: txt(v, ""))
                              df[base] = [l if l else r for l, r in zip(left, right)]
                          df.drop(columns=[c], inplace=True)

              for c in ["ma5_status","ma10_status","ma20_status","ma5_label","ma10_label","ma20_label","kbar_type","k_structure","kline_structure","tech_reason","kbar_reason","tech_decision_hint","updated_at"]:
                  if c not in df.columns:
                      df[c] = ""

              df["ma5_status"] = df.apply(lambda r: ma_label(r, "ma5", "MA5"), axis=1)
              df["ma10_status"] = df.apply(lambda r: ma_label(r, "ma10", "MA10"), axis=1)
              df["ma20_status"] = df.apply(lambda r: ma_label(r, "ma20", "MA20"), axis=1)
              df["ma5_label"] = df["ma5_status"]
              df["ma10_label"] = df["ma10_status"]
              df["ma20_label"] = df["ma20_status"]
              df["kbar_type"] = df.apply(kbar, axis=1)
              df["k_structure"] = df.apply(kstruct, axis=1)
              df["kline_structure"] = df["k_structure"]
              df["tech_reason"] = df["ma5_status"] + "｜" + df["ma10_status"] + "｜" + df["ma20_status"] + "｜K棒：" + df["kbar_type"] + "｜K線：" + df["k_structure"]
              df["kbar_reason"] = "K棒型態：" + df["kbar_type"] + "｜K線結構：" + df["k_structure"]
              df["tech_decision_hint"] = df["tech_decision_hint"].map(lambda v: txt(v, "依原策略執行，技術欄位用於確認節奏與風險。"))
              df["updated_at"] = now

              for c in df.columns:
                  df[c] = df[c].map(lambda v: txt(v, ""))

              df.to_csv(p, index=False, encoding="utf-8-sig")

          for name in ["final_action_plan.csv","trade_plan.csv","position_overlay.csv","ignition_candidates.csv","strategy_evolution.csv"]:
              lock_file(ROOT/name)
              lock_file(DATA/name)

          print("v266.59 display fields locked", now)
          PY


