name: data_pipeline

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 19:00 = UTC 11:00
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: data_pipeline_main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest main before generating outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git pull --ff-only origin main

      # v266.31 TRUE TIMER:
      # 後端任務一開始就寫 workflow_status.json，讓前端用後端 start_time 跑秒數。
      - name: Write workflow running status
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).isoformat()
          status = {
              "version": "v266.31.1_true_timer_stock_name_map",
              "status": "running",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "workflow": "${{ github.workflow }}",
              "branch": "${{ github.ref_name }}",
              "start_time": now,
              "updated_at": now,
              "source": "github_actions"
          }

          for p in [
              Path("workflow_status.json"),
              Path("mobile_dashboard_v1/data/workflow_status.json"),
          ]:
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          git add -f workflow_status.json mobile_dashboard_v1/data/workflow_status.json
          git commit -m "workflow status running ${{ github.run_number }}" || echo "no running status change"
          git push || echo "running status push skipped"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Merge price panel parts into runtime file
        run: |
          python merge_price_panel_parts_runtime.py

      - name: Backfill missing days
        run: |
          python backfill_missing_days.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run market regime
        run: |
          python market_regime_engine.py

      - name: Run pre-move engine
        run: |
          python pre_move_engine.py
          python pre_move_dashboard_patch.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Run timing engine
        run: |
          python feature_timing_engine.py

      - name: Run trading system allocator
        run: |
          python trading_system_allocator.py

      - name: Run exit risk engine
        run: |
          python exit_risk_engine.py

      - name: Run position overlay engine
        run: |
          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          else
            echo "position_overlay_engine.py not found, skip"
          fi

      # v266.31.1:
      # 建立 stock_id -> stock_name 對照表，讓手動持倉卡片也能顯示名稱。
      - name: Build stock name map for dashboard
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path

          try:
              import pandas as pd
          except Exception:
              pd = None

          name_cols = [
              "stock_name", "stockName", "name", "Name",
              "股票名稱", "證券名稱", "證券簡稱", "公司簡稱", "公司名稱",
              "security_name", "SecurityName", "short_name"
          ]
          id_cols = ["stock_id", "stockId", "symbol", "code", "股票代號", "證券代號"]

          files = [
              "position_overlay.csv",
              "manual_positions.csv",
              "trade_plan.csv",
              "final_action_plan.csv",
              "full_summary.csv",
              "selection_debug.csv",
              "watchlist_monitor.csv",
              "candidates.csv",
              "core_candidates.csv",
              "alpha_candidates.csv",
              "mobile_dashboard_v1/data/position_overlay.csv",
              "mobile_dashboard_v1/data/trade_plan.csv",
              "mobile_dashboard_v1/data/final_action_plan.csv",
              "mobile_dashboard_v1/data/selection_debug.csv",
          ]

          def sid_of(v):
              s = str(v or "").strip()
              m = re.search(r"\d{4}", s)
              return m.group(0) if m else ""

          def clean(v):
              s = str(v or "").strip()
              if not s or s.lower() in {"nan", "none", "null", "undefined", "--"}:
                  return ""
              return s

          out = {}

          if pd is not None:
              for f in files:
                  p = Path(f)
                  if not p.exists():
                      continue
                  try:
                      df = pd.read_csv(p, dtype=str)
                  except Exception:
                      continue

                  cols = list(df.columns)
                  sid_col = next((c for c in id_cols if c in cols), None)
                  name_col = next((c for c in name_cols if c in cols), None)
                  if not sid_col or not name_col:
                      continue

                  for _, r in df.iterrows():
                      sid = sid_of(r.get(sid_col))
                      name = clean(r.get(name_col))
                      if sid and name:
                          out[sid] = name

          # 目前持倉常見台股備援；後續有資料檔名稱時會自動覆蓋。
          fallback = {
              "2317": "鴻海",
              "2330": "台積電",
              "2409": "友達",
              "3051": "力特",
              "3583": "辛耘"
          }
          for k, v in fallback.items():
              out.setdefault(k, v)

          Path("stock_name_map.json").write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding="utf-8")
          Path("mobile_dashboard_v1/data").mkdir(parents=True, exist_ok=True)
          Path("mobile_dashboard_v1/data/stock_name_map.json").write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding="utf-8")

          # csv 備用
          lines = ["stock_id,stock_name"]
          for k in sorted(out):
              lines.append(f"{k},{out[k]}")
          Path("stock_name_map.csv").write_text("\n".join(lines) + "\n", encoding="utf-8")
          Path("mobile_dashboard_v1/data/stock_name_map.csv").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print("stock_name_map rows =", len(out))
          PY

      # v266.31 LOCK:
      # final_decision_engine.py 必須最後才跑。
      # 這樣 signal_date / trade_date 不會被 bridge、overlay、allocator、exit_risk 後段覆蓋。
      - name: Run final decision engine LAST
        run: |
          python final_decision_engine.py

      # 只同步 dashboard，不再重跑任何會改資料的 py。
      # 原本 Keep dashboard files after bridge 會重跑 final_decision_engine.py / overlay，
      # 造成 trade_date 被覆蓋回 signal_date，這版已鎖住。
      - name: Sync dashboard files only
        run: |
          mkdir -p mobile_dashboard_v1/data

          copy_if_exists () {
            if [ -f "$1" ]; then
              cp -f "$1" "$2"
              echo "copied $1 -> $2"
            else
              echo "skip missing $1"
            fi
          }

          copy_if_exists trade_plan.csv mobile_dashboard_v1/data/trade_plan.csv
          copy_if_exists final_action_plan.csv mobile_dashboard_v1/data/final_action_plan.csv
          copy_if_exists final_action_summary.json mobile_dashboard_v1/data/final_action_summary.json
          copy_if_exists exit_risk_plan.csv mobile_dashboard_v1/data/exit_risk_plan.csv
          copy_if_exists position_overlay.csv mobile_dashboard_v1/data/position_overlay.csv

          copy_if_exists candidates.csv mobile_dashboard_v1/data/candidates.csv
          copy_if_exists core_candidates.csv mobile_dashboard_v1/data/core_candidates.csv
          copy_if_exists alpha_candidates.csv mobile_dashboard_v1/data/alpha_candidates.csv
          copy_if_exists ignition_candidates.csv mobile_dashboard_v1/data/ignition_candidates.csv
          copy_if_exists selection_debug.csv mobile_dashboard_v1/data/selection_debug.csv

          copy_if_exists timing_candidates.csv mobile_dashboard_v1/data/timing_candidates.csv
          copy_if_exists timing_summary.json mobile_dashboard_v1/data/timing_summary.json
          copy_if_exists trading_system_plan.csv mobile_dashboard_v1/data/trading_system_plan.csv
          copy_if_exists trading_system_summary.json mobile_dashboard_v1/data/trading_system_summary.json

          copy_if_exists pre_move_candidates.csv mobile_dashboard_v1/data/pre_move_candidates.csv
          copy_if_exists pre_move_summary.json mobile_dashboard_v1/data/pre_move_summary.json
          copy_if_exists pre_move_cards.json mobile_dashboard_v1/data/pre_move_cards.json

          copy_if_exists data_meta.json mobile_dashboard_v1/data/data_meta.json
          copy_if_exists feature_meta.json mobile_dashboard_v1/data/feature_meta.json
          copy_if_exists data_guard_report.json mobile_dashboard_v1/data/data_guard_report.json
          copy_if_exists backfill_report.json mobile_dashboard_v1/data/backfill_report.json
          copy_if_exists meta.json mobile_dashboard_v1/data/meta.json

          copy_if_exists manual_positions.csv mobile_dashboard_v1/data/manual_positions.csv
          copy_if_exists position_overlay_debug.csv mobile_dashboard_v1/data/position_overlay_debug.csv
          copy_if_exists position_overlay_summary.txt mobile_dashboard_v1/data/position_overlay_summary.txt
          copy_if_exists workflow_status.json mobile_dashboard_v1/data/workflow_status.json
          copy_if_exists stock_name_map.json mobile_dashboard_v1/data/stock_name_map.json
          copy_if_exists stock_name_map.csv mobile_dashboard_v1/data/stock_name_map.csv

      - name: Verify locked dates
        run: |
          echo "==== VERIFY trade_plan date columns ===="
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          for p in [
              "trade_plan.csv",
              "final_action_plan.csv",
              "mobile_dashboard_v1/data/trade_plan.csv",
              "mobile_dashboard_v1/data/final_action_plan.csv",
          ]:
              path = Path(p)
              print("\n==", p, "==")
              if not path.exists():
                  print("MISSING")
                  continue
              df = pd.read_csv(path, dtype=str)
              print("rows=", len(df))
              print("columns=", list(df.columns)[:20])
              cols = [c for c in ["signal_date", "trade_date"] if c in df.columns]
              if cols and len(df):
                  print(df[cols].head(10).to_string(index=False))
              else:
                  print("NO signal_date/trade_date columns")
          PY

      - name: Clean runtime big files
        run: |
          rm -f price_panel_daily.csv
          rm -f feature_panel_daily.csv
          rm -f raw_market_daily.csv
          rm -f mobile_dashboard_v1/data/price_panel_daily.csv
          rm -f mobile_dashboard_v1/data/feature_panel_daily.csv
          rm -f mobile_dashboard_v1/data/raw_market_daily.csv

      - name: Commit small files only
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          echo "==== git status before add ===="
          git status --short

          git add -f position_overlay.csv || true
          git add -f mobile_dashboard_v1/data/position_overlay.csv || true
          git add -f position_overlay_debug.csv || true
          git add -f position_overlay_summary.txt || true
          git add -f mobile_dashboard_v1/data/position_overlay_debug.csv || true
          git add -f mobile_dashboard_v1/data/position_overlay_summary.txt || true
          git add -f manual_positions.csv || true
          git add -f mobile_dashboard_v1/data/manual_positions.csv || true
          git add -f workflow_status.json || true
          git add -f mobile_dashboard_v1/data/workflow_status.json || true
          git add -f stock_name_map.json stock_name_map.csv || true
          git add -f mobile_dashboard_v1/data/stock_name_map.json || true
          git add -f mobile_dashboard_v1/data/stock_name_map.csv || true

          git add -f trade_plan.csv final_action_plan.csv final_action_summary.json exit_risk_plan.csv || true
          git add -f mobile_dashboard_v1/data/trade_plan.csv || true
          git add -f mobile_dashboard_v1/data/final_action_plan.csv || true
          git add -f mobile_dashboard_v1/data/final_action_summary.json || true
          git add -f mobile_dashboard_v1/data/exit_risk_plan.csv || true

          git add -f candidates.csv core_candidates.csv alpha_candidates.csv selection_debug.csv || true
          git add -f timing_candidates.csv timing_summary.json || true
          git add -f trading_system_plan.csv trading_system_summary.json || true
          git add -f pre_move_candidates.csv pre_move_summary.json pre_move_cards.json || true
          git add -f data_meta.json feature_meta.json data_guard_report.json backfill_report.json meta.json || true

          git add -f mobile_dashboard_v1/data/candidates.csv || true
          git add -f mobile_dashboard_v1/data/core_candidates.csv || true
          git add -f mobile_dashboard_v1/data/alpha_candidates.csv || true
          git add -f mobile_dashboard_v1/data/selection_debug.csv || true
          git add -f mobile_dashboard_v1/data/timing_candidates.csv || true
          git add -f mobile_dashboard_v1/data/timing_summary.json || true
          git add -f mobile_dashboard_v1/data/trading_system_plan.csv || true
          git add -f mobile_dashboard_v1/data/trading_system_summary.json || true
          git add -f mobile_dashboard_v1/data/pre_move_candidates.csv || true
          git add -f mobile_dashboard_v1/data/pre_move_summary.json || true
          git add -f mobile_dashboard_v1/data/pre_move_cards.json || true
          git add -f mobile_dashboard_v1/data/data_meta.json || true
          git add -f mobile_dashboard_v1/data/feature_meta.json || true
          git add -f mobile_dashboard_v1/data/data_guard_report.json || true
          git add -f mobile_dashboard_v1/data/backfill_report.json || true
          git add -f mobile_dashboard_v1/data/meta.json || true

          git reset -- price_panel_daily.csv || true
          git reset -- feature_panel_daily.csv || true
          git reset -- raw_market_daily.csv || true
          git reset -- mobile_dashboard_v1/data/price_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/feature_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/raw_market_daily.csv || true

          echo "==== staged files ===="
          git diff --cached --name-only

          echo "==== staged date preview ===="
          git diff --cached -- mobile_dashboard_v1/data/final_action_plan.csv | head -120 || true

          if git diff --cached --quiet; then
            echo "no update"
          else
            git commit -m "lock pipeline final decision outputs"
            git push
          fi

      # v266.31 TRUE TIMER:
      # 無論成功或失敗，都寫入最終狀態，讓前端顯示完成 / 失敗與總耗時。
      - name: Write workflow final status
        if: always()
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).isoformat()
          final_status = "${{ job.status }}"
          old = {}

          old_path = Path("workflow_status.json")
          if old_path.exists():
              try:
                  old = json.loads(old_path.read_text(encoding="utf-8"))
              except Exception:
                  old = {}

          status = {
              "version": "v266.31.1_true_timer_stock_name_map",
              "status": "success" if final_status == "success" else "failed",
              "job_status": final_status,
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "workflow": "${{ github.workflow }}",
              "branch": "${{ github.ref_name }}",
              "start_time": old.get("start_time") or now,
              "end_time": now,
              "updated_at": now,
              "source": "github_actions"
          }

          for p in [
              Path("workflow_status.json"),
              Path("mobile_dashboard_v1/data/workflow_status.json"),
          ]:
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git pull --rebase origin main || true
          git add -f workflow_status.json mobile_dashboard_v1/data/workflow_status.json
          git commit -m "workflow status final ${{ github.run_number }}" || echo "no final status change"
          git push || echo "final status push skipped"

