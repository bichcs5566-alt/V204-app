name: data_pipeline

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 19:00 = UTC 11:00
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: data_pipeline_main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest main before generating outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Merge price panel parts into runtime file
        run: |
          python merge_price_panel_parts_runtime.py

      - name: Backfill missing days
        run: |
          python backfill_missing_days.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run market regime
        run: |
          python market_regime_engine.py

      - name: Run pre-move engine
        run: |
          python pre_move_engine.py
          python pre_move_dashboard_patch.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Run timing engine
        run: |
          python feature_timing_engine.py

      - name: Run trading system allocator
        run: |
          python trading_system_allocator.py

      - name: Run exit risk engine
        run: |
          python exit_risk_engine.py

      - name: Run final decision engine
        run: |
          python final_decision_engine.py

      - name: Sync dashboard
        run: |
          if [ -f v3_1_dashboard_bridge.py ]; then
            python v3_1_dashboard_bridge.py
          else
            echo "bridge not found, skip"
          fi

      - name: Keep dashboard files after bridge
        run: |
          if [ -f pre_move_dashboard_patch.py ]; then
            python pre_move_dashboard_patch.py
          fi
          if [ -f feature_timing_engine.py ]; then
            python feature_timing_engine.py
          fi
          if [ -f trading_system_allocator.py ]; then
            python trading_system_allocator.py
          fi
          if [ -f exit_risk_engine.py ]; then
            python exit_risk_engine.py
          fi
          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          fi
          if [ -f final_decision_engine.py ]; then
            python final_decision_engine.py
          fi
          if [ -f position_overlay.csv ]; then
            cp -f position_overlay.csv mobile_dashboard_v1/data/position_overlay.csv
          fi

      - name: Force sync position overlay to dashboard
        run: |
          echo "==== FORCE POSITION OVERLAY SYNC START ===="

          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          else
            echo "position_overlay_engine.py not found"
            exit 1
          fi

          echo "==== ROOT position_overlay.csv ===="
          ls -lh position_overlay.csv || true
          wc -l position_overlay.csv || true
          head -5 position_overlay.csv || true

          if [ ! -f position_overlay.csv ]; then
            echo "ERROR: position_overlay.csv not generated"
            exit 1
          fi

          LINE_COUNT=$(wc -l < position_overlay.csv)
          if [ "$LINE_COUNT" -le 1 ]; then
            echo "ERROR: position_overlay.csv only header, stop pipeline"
            exit 1
          fi

          mkdir -p mobile_dashboard_v1/data
          cp -f position_overlay.csv mobile_dashboard_v1/data/position_overlay.csv

          echo "==== DASHBOARD position_overlay.csv ===="
          ls -lh mobile_dashboard_v1/data/position_overlay.csv || true
          wc -l mobile_dashboard_v1/data/position_overlay.csv || true
          head -5 mobile_dashboard_v1/data/position_overlay.csv || true

          echo "==== FORCE POSITION OVERLAY SYNC END ===="

      - name: Clean runtime big files
        run: |
          rm -f price_panel_daily.csv
          rm -f feature_panel_daily.csv
          rm -f raw_market_daily.csv
          rm -f mobile_dashboard_v1/data/price_panel_daily.csv
          rm -f mobile_dashboard_v1/data/feature_panel_daily.csv
          rm -f mobile_dashboard_v1/data/raw_market_daily.csv

      - name: Commit small files only
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          echo "==== git status before add ===="
          git status --short

          git add -f position_overlay.csv
          git add -f mobile_dashboard_v1/data/position_overlay.csv
          git add -f mobile_dashboard_v1/data/position_overlay_debug.csv || true
          git add -f mobile_dashboard_v1/data/position_overlay_summary.txt || true
          git add -f manual_positions.csv || true
          git add -f mobile_dashboard_v1/data/manual_positions.csv || true

          git add -f trade_plan.csv final_action_plan.csv exit_risk_plan.csv || true
          git add -f mobile_dashboard_v1/data/trade_plan.csv || true
          git add -f mobile_dashboard_v1/data/final_action_plan.csv || true
          git add -f mobile_dashboard_v1/data/exit_risk_plan.csv || true

          git add -f candidates.csv core_candidates.csv alpha_candidates.csv selection_debug.csv || true
          git add -f timing_candidates.csv timing_summary.json || true
          git add -f trading_system_plan.csv trading_system_summary.json || true
          git add -f pre_move_candidates.csv pre_move_summary.json || true
          git add -f data_meta.json feature_meta.json data_guard_report.json backfill_report.json meta.json || true

          git add -f mobile_dashboard_v1/data/candidates.csv || true
          git add -f mobile_dashboard_v1/data/core_candidates.csv || true
          git add -f mobile_dashboard_v1/data/alpha_candidates.csv || true
          git add -f mobile_dashboard_v1/data/selection_debug.csv || true
          git add -f mobile_dashboard_v1/data/timing_candidates.csv || true
          git add -f mobile_dashboard_v1/data/timing_summary.json || true
          git add -f mobile_dashboard_v1/data/trading_system_plan.csv || true
          git add -f mobile_dashboard_v1/data/trading_system_summary.json || true
          git add -f mobile_dashboard_v1/data/pre_move_candidates.csv || true
          git add -f mobile_dashboard_v1/data/pre_move_summary.json || true
          git add -f mobile_dashboard_v1/data/pre_move_cards.json || true
          git add -f mobile_dashboard_v1/data/data_meta.json || true
          git add -f mobile_dashboard_v1/data/feature_meta.json || true
          git add -f mobile_dashboard_v1/data/data_guard_report.json || true
          git add -f mobile_dashboard_v1/data/backfill_report.json || true
          git add -f mobile_dashboard_v1/data/meta.json || true

          git reset -- price_panel_daily.csv || true
          git reset -- feature_panel_daily.csv || true
          git reset -- raw_market_daily.csv || true
          git reset -- mobile_dashboard_v1/data/price_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/feature_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/raw_market_daily.csv || true

          echo "==== staged files ===="
          git diff --cached --name-only

          echo "==== staged position overlay preview ===="
          git diff --cached -- mobile_dashboard_v1/data/position_overlay.csv | head -120 || true

          if git diff --cached --quiet; then
            echo "no update"
          else
            git commit -m "force update position overlay"
            git push
          fi
