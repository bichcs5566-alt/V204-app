      # v266.59 TRUE LIVE TIMER：
      # 無論成功或失敗，都寫入正確總耗時；不再出現 0分00秒。
      - name: Write workflow final status
        if: always()
        run: |
          python - <<'PY'
          import json, os, time
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          tw = timezone(timedelta(hours=8))
          now_dt = datetime.now(tw)
          now_iso = now_dt.isoformat()
          final_status = "${{ job.status }}"

          old = {}
          for old_path in [Path("workflow_status.json"), Path("mobile_dashboard_v1/data/workflow_status.json")]:
              if old_path.exists():
                  try:
                      old = json.loads(old_path.read_text(encoding="utf-8-sig"))
                      break
                  except Exception:
                      pass

          start_epoch = old.get("start_epoch") or os.environ.get("BACKEND_START_EPOCH")
          try:
              start_epoch = int(float(start_epoch))
          except Exception:
              start_epoch = int(time.time())

          elapsed = max(0, int(time.time()) - start_epoch)
          start_dt = datetime.fromtimestamp(start_epoch, tw)
          duration_text = f"{elapsed//60}分{elapsed%60:02d}秒"

          status = {
              "version": "v266.59",
              "status": "success" if final_status == "success" else "failed",
              "job_status": final_status,
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "workflow": "${{ github.workflow }}",
              "branch": "${{ github.ref_name }}",
              "start_time": start_dt.isoformat(),
              "started_at": start_dt.isoformat(),
              "start_epoch": start_epoch,
              "end_time": now_iso,
              "completed_at": now_iso,
              "end_epoch": int(time.time()),
              "elapsed_seconds": elapsed,
              "duration_text": duration_text,
              "updated_at": now_iso,
              "timezone": "Asia/Taipei",
              "source": "github_actions_live_timer"
          }

          for p in [
              Path("workflow_status.json"),
              Path("mobile_dashboard_v1/data/workflow_status.json"),
          ]:
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git pull --rebase origin main || true
          git add -f workflow_status.json mobile_dashboard_v1/data/workflow_status.json
          git commit -m "workflow status final ${{ github.run_number }}" || echo "no final status change"
          git push || echo "final status push skipped"

