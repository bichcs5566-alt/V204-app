name: data_pipeline  # v266.59 fake breakout guard

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 19:00 = UTC 11:00
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: data_pipeline_main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest main before generating outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git pull --ff-only origin main

      # v266.59 TRUE LIVE TIMER：
      # 任務一開始寫入真正 start_time / start_epoch，前端可像手錶每秒更新。
      - name: Write workflow running status
        run: |
          python - <<'PY'
          import json, time
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          tw = timezone(timedelta(hours=8))
          now_dt = datetime.now(tw)
          now_iso = now_dt.isoformat()
          start_epoch = int(time.time())
          status = {
              "version": "v266.59",
              "status": "running",
              "job_status": "running",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "workflow": "${{ github.workflow }}",
              "branch": "${{ github.ref_name }}",
              "start_time": now_iso,
              "started_at": now_iso,
              "start_epoch": start_epoch,
              "updated_at": now_iso,
              "timezone": "Asia/Taipei",
              "source": "github_actions_live_timer"
          }

          for p in [
              Path("workflow_status.json"),
              Path("mobile_dashboard_v1/data/workflow_status.json"),
          ]:
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          echo "BACKEND_START_EPOCH=$(python - <<'PY'
          import json
          print(json.load(open('workflow_status.json'))['start_epoch'])
          PY
          )" >> $GITHUB_ENV

          git add -f workflow_status.json mobile_dashboard_v1/data/workflow_status.json
          git commit -m "workflow status running ${{ github.run_number }}" || echo "no running status change"
          git push || echo "running status push skipped"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Merge price panel parts into runtime file
        run: |
          python merge_price_panel_parts_runtime.py

      - name: Backfill missing days
        run: |
          python backfill_missing_days.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run market regime
        run: |
          python market_regime_engine.py

      - name: Run pre-move engine
        run: |
          python pre_move_engine.py
          python pre_move_dashboard_patch.py

      - name: Run data guard
        run: |
          python v266_data_guard.py


      # v266.59：策略前置檢查，避免 import / syntax 問題跑到中段才炸。



      - name: Confirm v266.59 safe behavior path
        run: |
          echo "v266.59 OK: old broken Enrich step removed; safe behavior step remains."


      # v266.59：防止主程式尾端被手機複製/貼上截斷。
      - name: Repair strategy main tail before syntax check
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("v266_strategy_engine.py")
          s = p.read_text(encoding="utf-8", errors="ignore")
          marker = "if __name__"
          if marker in s:
              s = s[:s.rfind(marker)].rstrip()
          s = s.rstrip() + '\n\nif __name__ == "__main__":\n    main()\n'
          p.write_text(s, encoding="utf-8")
          print("v266.59 repaired __main__ tail")
          PY


      - name: Preflight strategy syntax and imports
        run: |
          python - <<'PY'
          import py_compile
          py_compile.compile("v266_strategy_engine.py", doraise=True)
          print("v266.59 preflight OK")
          PY



      # v266.59：強制刷新。跑策略前清掉舊標的輸出，避免 final_action_plan 沿用舊檔。
      - name: Clear stale strategy outputs before rebuild
        run: |
          python - <<'PY'
          from pathlib import Path
          stale = [
              "final_action_plan.csv",
              "trade_plan.csv",
              "ignition_candidates.csv",
              "strategy_evolution.csv",
              "selection_debug.csv",
              "full_summary.csv",
          ]
          roots = [Path("."), Path("mobile_dashboard_v1/data")]
          for root in roots:
              root.mkdir(parents=True, exist_ok=True)
              for name in stale:
                  p = root / name
                  if p.exists():
                      p.unlink()
                      print("cleared", p)
          print("v266.59 stale outputs cleared")
          PY


      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Run timing engine
        run: |
          python feature_timing_engine.py

      - name: Run trading system allocator
        run: |
          python trading_system_allocator.py

      - name: Run exit risk engine
        run: |
          python exit_risk_engine.py

      - name: Run position overlay engine
        run: |
          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          else
            echo "position_overlay_engine.py not found, skip"
          fi

      # v266.31.1:
      # 建立 stock_id -> stock_name 對照表，讓手動持倉卡片也能顯示名稱。

      # v266.59：持倉區也補齊行為判讀，讓持倉卡片與試單/觀察/起漲/進化清單一致。
      - name: Add behavior interpretation to position files
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import pandas as pd

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          POSITION_FILES = [
              "position_overlay.csv",
              "position_monitor.csv",
              "current_positions.csv",
              "manual_positions.csv",
          ]

          def read_csv_safe(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def clean(v):
              s = "" if v is None else str(v).strip()
              return "" if s in ["", "--", "-", "nan", "NaN", "None", "null", "undefined", "資料不足", "資料有限"] else s

          def behavior(row):
              text_all = " ".join(clean(row.get(c, "")) for c in [
                  "holding_status", "status", "position_status", "final_action", "action", "reason",
                  "system_note", "tech_reason", "kbar_type", "k_structure", "kline_structure",
                  "ma5_status", "ma10_status", "ma20_status"
              ])

              pnl = None
              for c in ["pnl_pct", "profit_pct", "損益%", "return_pct"]:
                  try:
                      if clean(row.get(c, "")):
                          pnl = float(str(row.get(c)).replace("%", "").replace(",", ""))
                          break
                  except Exception:
                      pass

              if any(x in text_all for x in ["SELL", "REDUCE", "賣", "賣出", "出場", "停損", "跌破", "短線轉弱", "停損風控"]):
                  return ("🔻 結構轉弱（優先控風險）", "高", "先控風險，不急著攤平；等站回關鍵均線再觀察。")

              if pnl is not None and pnl >= 20 and any(x in text_all for x in ["轉弱", "跌破", "分散", "低信心"]):
                  return ("⚠️ 高獲利區換手／可能出貨（分批保護）", "中高", "已進入高獲利區，若 MA5 / 籌碼轉弱，優先分批停利。")

              if any(x in text_all for x in ["高檔出貨", "假突破", "上影壓力", "疑似假突破", "誘多"]):
                  return ("⚠️ 高檔出貨／誘多風險（不追高）", "中高", "避免追價；若已有部位，觀察是否跌破 MA5 / MA10。")

              if any(x in text_all for x in ["突破長紅", "突破確認", "多頭排列", "強勢", "續抱觀察", "站上"]):
                  return ("🚀 主力拉升（趨勢延續）", "高", "可續抱；若獲利擴大，改用移動停利保護。")

              if any(x in text_all for x in ["整理收斂", "整理觀察", "下影支撐", "洗盤", "吸籌", "換手", "貼近"]):
                  return ("🟡 洗盤吸籌／整理換手（結構未壞）", "中高", "持倉可續觀察；跌破 MA20 或停損線再處理。")

              if any(x in text_all for x in ["WATCH", "觀察", "盤整", "震盪", "十字"]):
                  return ("⚪ 盤整觀望（等待方向）", "中低", "持倉不急動作，等突破或跌破關鍵均線再決策。")

              return ("⚪ 行為中性（依持倉風控）", "中低", "目前沒有明確行為訊號，依停損/停利規則管理。")

          for name in POSITION_FILES:
              for p in [ROOT / name, DATA / name]:
                  df = read_csv_safe(p)
                  if df.empty:
                      continue
                  vals = df.apply(behavior, axis=1)
                  df["behavior_hint"] = [v[0] for v in vals]
                  df["behavior_confidence"] = [v[1] for v in vals]
                  df["behavior_action_hint"] = [v[2] for v in vals]
                  df["updated_at"] = now
                  df.to_csv(p, index=False, encoding="utf-8-sig")
                  print("position behavior enriched:", p, len(df))

          print("v266.59 position behavior complete", now)
          PY


      - name: Build stock name map for dashboard
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path

          try:
              import pandas as pd
          except Exception:
              pd = None

          name_cols = [
              "stock_name", "stockName", "name", "Name",
              "股票名稱", "證券名稱", "證券簡稱", "公司簡稱", "公司名稱",
              "security_name", "SecurityName", "short_name"
          ]
          id_cols = ["stock_id", "stockId", "symbol", "code", "股票代號", "證券代號"]

          files = [
              "position_overlay.csv",
              "manual_positions.csv",
              "trade_plan.csv",
              "final_action_plan.csv",
              "full_summary.csv",
              "selection_debug.csv",
              "watchlist_monitor.csv",
              "candidates.csv",
              "core_candidates.csv",
              "alpha_candidates.csv",
              "mobile_dashboard_v1/data/position_overlay.csv",
              "mobile_dashboard_v1/data/trade_plan.csv",
              "mobile_dashboard_v1/data/final_action_plan.csv",
              "mobile_dashboard_v1/data/selection_debug.csv",
          ]

          def sid_of(v):
              s = str(v or "").strip()
              m = re.search(r"\d{4}", s)
              return m.group(0) if m else ""

          def clean(v):
              s = str(v or "").strip()
              if not s or s.lower() in {"nan", "none", "null", "undefined", "--"}:
                  return ""
              return s

          out = {}

          if pd is not None:
              for f in files:
                  p = Path(f)
                  if not p.exists():
                      continue
                  try:
                      df = pd.read_csv(p, dtype=str)
                  except Exception:
                      continue

                  cols = list(df.columns)
                  sid_col = next((c for c in id_cols if c in cols), None)
                  name_col = next((c for c in name_cols if c in cols), None)
                  if not sid_col or not name_col:
                      continue

                  for _, r in df.iterrows():
                      sid = sid_of(r.get(sid_col))
                      name = clean(r.get(name_col))
                      if sid and name:
                          out[sid] = name

          # 目前持倉常見台股備援；後續有資料檔名稱時會自動覆蓋。
          fallback = {
              "2317": "鴻海",
              "2330": "台積電",
              "2409": "友達",
              "3051": "力特",
              "3583": "辛耘"
          }
          for k, v in fallback.items():
              out.setdefault(k, v)

          Path("stock_name_map.json").write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding="utf-8")
          Path("mobile_dashboard_v1/data").mkdir(parents=True, exist_ok=True)
          Path("mobile_dashboard_v1/data/stock_name_map.json").write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding="utf-8")

          # csv 備用
          lines = ["stock_id,stock_name"]
          for k in sorted(out):
              lines.append(f"{k},{out[k]}")
          Path("stock_name_map.csv").write_text("\n".join(lines) + "\n", encoding="utf-8")
          Path("mobile_dashboard_v1/data/stock_name_map.csv").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print("stock_name_map rows =", len(out))
          PY

      # v266.31 LOCK:
      # final_decision_engine.py 必須最後才跑。
      # 這樣 signal_date / trade_date 不會被 bridge、overlay、allocator、exit_risk 後段覆蓋。
      - name: Run final decision engine LAST
        run: |
          python final_decision_engine.py

      # 只同步 dashboard，不再重跑任何會改資料的 py。
      # 原本 Keep dashboard files after bridge 會重跑 final_decision_engine.py / overlay，
      # 造成 trade_date 被覆蓋回 signal_date，這版已鎖住。


      # v266.59：最終輸出補齊技術欄位（完全防炸版）

      - name: Add behavior interpretation fields safely
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import pandas as pd

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")

          FILES = [
              "final_action_plan.csv",
              "trade_plan.csv",
              "position_overlay.csv",
              "position_monitor.csv",
              "current_positions.csv",
              "manual_positions.csv",
              "ignition_candidates.csv",
              "strategy_evolution.csv",
          ]

          def read_csv_safe(p):
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  return pd.DataFrame()
              try:
                  return pd.read_csv(p, dtype=str, encoding="utf-8-sig")
              except Exception:
                  try:
                      return pd.read_csv(p, dtype=str)
                  except Exception:
                      return pd.DataFrame()

          def clean(v):
              if v is None:
                  return ""
              s = str(v).strip()
              if s in ["", "--", "-", "nan", "NaN", "None", "null", "undefined", "資料不足", "資料有限"]:
                  return ""
              return s

          def behavior(row):
              text_all = " ".join(clean(row.get(c, "")) for c in [
                  "final_action", "action", "status", "decision", "reason",
                  "system_note", "tech_reason", "kbar_type", "k_structure", "kline_structure"
              ])

              if any(x in text_all for x in ["SELL", "REDUCE", "賣", "賣出", "出場", "停損", "跌破", "短線轉弱"]):
                  return ("🔻 結構轉弱（優先控風險）", "高", "先控風險，不急著攤平；等站回關鍵均線再觀察。")

              if any(x in text_all for x in ["高檔出貨", "假突破", "上影壓力", "疑似假突破", "誘多"]):
                  return ("⚠️ 高檔出貨／誘多風險（不追高）", "中高", "避免追價；若已有部位，觀察是否跌破 MA5 / MA10。")

              if any(x in text_all for x in ["突破長紅", "突破確認", "多頭排列", "強勢", "主力拉升"]):
                  return ("🚀 主力拉升（趨勢延續）", "高", "可續抱；若是試單，可觀察是否進入加碼條件。")

              if any(x in text_all for x in ["整理收斂", "整理觀察", "下影支撐", "洗盤", "吸籌", "換手"]):
                  return ("🟡 洗盤吸籌／整理換手（結構未壞）", "中高", "不急追；等放量突破或站穩 MA10 / MA20 再提高權重。")

              if any(x in text_all for x in ["WATCH", "觀察", "盤整", "震盪", "十字"]):
                  return ("⚪ 盤整觀望（等待方向）", "中低", "先觀察，不急進場；等突破、量能或均線方向出現。")

              return ("⚪ 行為中性（依策略判斷）", "中低", "目前訊號不夠明確，依原策略與風控執行。")

          def enrich_file(path):
              p = Path(path)
              df = read_csv_safe(p)
              if df.empty:
                  return
              vals = df.apply(behavior, axis=1)
              df["behavior_hint"] = [v[0] for v in vals]
              df["behavior_confidence"] = [v[1] for v in vals]
              df["behavior_action_hint"] = [v[2] for v in vals]
              df["updated_at"] = now
              df.to_csv(p, index=False, encoding="utf-8-sig")
              print("behavior enriched:", p, len(df))

          for name in FILES:
              enrich_file(ROOT / name)
              enrich_file(DATA / name)

          print("v266.59 behavior fields safe complete", now)
          PY


      - name: Lock signal date and summary metadata
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta, timezone
          import json
          import pandas as pd

          ROOT = Path(".")
          DATA = ROOT / "mobile_dashboard_v1" / "data"
          DATA.mkdir(parents=True, exist_ok=True)

          def read_json(p):
              p = Path(p)
              if not p.exists():
                  return {}
              try:
                  return json.loads(p.read_text(encoding="utf-8-sig"))
              except Exception:
                  try:
                      return json.loads(p.read_text(encoding="utf-8"))
                  except Exception:
                      return {}

          def write_json_both(obj, name):
              obj = dict(obj or {})
              for p in [ROOT / name, DATA / name]:
                  p.parent.mkdir(parents=True, exist_ok=True)
                  p.write_text(json.dumps(obj, ensure_ascii=False, indent=2), encoding="utf-8-sig")

          def next_trade_date(signal_date):
              d = pd.to_datetime(signal_date) + pd.Timedelta(days=1)
              # 跳過六日；台股特殊休市日後續可再接行事曆。
              if d.weekday() == 5:
                  d += pd.Timedelta(days=2)
              elif d.weekday() == 6:
                  d += pd.Timedelta(days=1)
              return d

          feature_paths = [
              ROOT / "feature_panel_daily.csv",
              DATA / "feature_panel_daily.csv",
              ROOT / "price_panel_daily.csv",
              DATA / "price_panel_daily.csv",
          ]

          latest_date = None
          source_file = ""
          for p in feature_paths:
              if not p.exists() or p.stat().st_size == 0:
                  continue
              try:
                  df = pd.read_csv(p, usecols=lambda c: c in ["date"], dtype=str)
                  if "date" not in df.columns or df.empty:
                      continue
                  d = pd.to_datetime(df["date"], errors="coerce").dropna()
                  if not d.empty:
                      latest_date = d.max()
                      source_file = str(p)
                      break
              except Exception as e:
                  print("skip date source", p, e)

          # fallback：從 trade_plan / final_action_plan 找 date 欄
          if latest_date is None:
              for p in [ROOT / "trade_plan.csv", ROOT / "final_action_plan.csv", DATA / "trade_plan.csv", DATA / "final_action_plan.csv"]:
                  if not p.exists() or p.stat().st_size == 0:
                      continue
                  try:
                      df = pd.read_csv(p, dtype=str)
                      date_cols = [c for c in df.columns if c.lower() in ["date","signal_date","latest_date"]]
                      for c in date_cols:
                          d = pd.to_datetime(df[c], errors="coerce").dropna()
                          if not d.empty:
                              latest_date = d.max()
                              source_file = str(p) + ":" + c
                              break
                      if latest_date is not None:
                          break
                  except Exception as e:
                      print("skip csv fallback", p, e)

          if latest_date is None:
              latest_date = pd.Timestamp.today().normalize()
              source_file = "fallback_today"

          signal_date = latest_date.strftime("%Y-%m-%d")
          trade_date = next_trade_date(latest_date).strftime("%Y-%m-%d")
          TW_TZ = timezone(timedelta(hours=8))
          now = datetime.now(TW_TZ).strftime("%Y-%m-%d %H:%M:%S")

          # 讀取目前 summary/meta，保留原本欄位，只覆蓋日期與版本。
          summary = read_json(ROOT / "final_action_summary.json") or read_json(DATA / "final_action_summary.json")
          meta = read_json(ROOT / "meta.json") or read_json(DATA / "meta.json")
          regime = read_json(ROOT / "market_regime.json") or read_json(DATA / "market_regime.json")

          patch = {
              "source": "v266_59_single_source_lock",
              "version": "v266.59",
              "signal_date": signal_date,
              "latest_date": signal_date,
              "trade_date": trade_date,
              "updated_at": now,
              "generated_at": summary.get("generated_at") or meta.get("generated_at") or now,
              "date_lock_source": source_file,
              "date_state": "locked_from_latest_feature",
          }

          summary.update(patch)
          meta.update(patch)
          regime.update({
              "signal_date": signal_date,
              "latest_date": signal_date,
              "date": signal_date,
              "trade_date": trade_date,
              "updated_at": now,
              "generated_at": regime.get("generated_at") or now,
              "source": "v266_59_single_source_lock",
              "version": "v266.59",
              "date_lock_source": source_file,
          })

          write_json_both(summary, "final_action_summary.json")
          write_json_both(meta, "meta.json")
          write_json_both(regime, "market_regime.json")

          # 另外輸出一份 debug，方便你手機檢查。
          write_json_both({
              "version": "v266.59",
              "signal_date": signal_date,
              "trade_date": trade_date,
              "updated_at": now,
