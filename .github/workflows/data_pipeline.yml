      # v266.59：最終操作來源鎖定。
      # 目的：跑完策略後 final_action_plan 不可沿用舊賣出標的。
      # 規則：
      # 1. 若本輪沒有持倉，SELL/REDUCE 全部清空。
      # 2. 若有持倉，只允許 SELL 出現在本輪 position_overlay 的持倉 stock_id。
