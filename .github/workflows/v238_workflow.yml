name: run-v238

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas numpy yfinance
      - run: python v235_macro_updater.py
      - run: python v238_main.py
      - uses: actions/upload-artifact@v4
        with:
          name: v238_result
          path: |
            v238_nav.csv
            v238_trades.csv
            v238_summary.csv
