name: run-v224

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run v224
        run: |
          python v224_main.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v224-result
          path: v224_nav.csv
          if-no-files-found: error
