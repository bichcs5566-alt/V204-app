name: run-v224

on:
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install pandas numpy

      - run: python v224_main.py

      - uses: actions/upload-artifact@v3
        with:
          name: v224-result
          path: v224_nav.csv
