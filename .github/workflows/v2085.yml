name: v2085_daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install pandas numpy

      - run: |
          python v2085_daily_rebuild.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git diff --cached --quiet || git commit -m "daily v208.5"
          git push
