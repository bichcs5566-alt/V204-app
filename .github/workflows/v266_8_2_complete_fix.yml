name: v266_8_2_complete_fix

on:
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy requests

      # 🔥 核心策略執行（你現在主引擎）
      - name: Run v266 base strategy
        run: |
          python v266_4_auto_pipeline.py

      # 🔍 檢查資料（不強制炸）
      - name: Verify price panel exists
        run: |
          echo "=== 檢查主資料 ==="
          ls -lah
          if [ ! -f price_panel_daily.csv ]; then
            echo "⚠️ price_panel_daily.csv 尚未存在"
            echo "=== 嘗試列出相關檔案 ==="
            find . -maxdepth 2 \( -name "*price*" -o -name "*panel*" \) | sort || true
          else
            echo "✅ 已存在 price_panel_daily.csv"
          fi

      # 📁 建立 dashboard 目錄
      - name: Prepare dashboard data folder
        run: |
          mkdir -p mobile_dashboard_v1/data

      # 📦 同步資料給前端
      - name: Copy price panel to dashboard
        run: |
          if [ -f price_panel_daily.csv ]; then
            cp -f price_panel_daily.csv mobile_dashboard_v1/data/price_panel_daily.csv
            echo "✅ 已同步 price_panel"
          else
            echo "⚠️ 沒有 price_panel 可同步"
          fi

      # 📊 檢查輸出
      - name: Show output files
        run: |
          echo "=== ROOT ==="
          ls -lah
          echo "=== DASHBOARD DATA ==="
          ls -lah mobile_dashboard_v1/data || true

      # 🔥 穩定版 commit（不會炸）
      - name: Commit outputs (stable)
        continue-on-error: true
        run: |
          echo "=== 開始 commit ==="
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "update: pipeline outputs (stable)" || echo "⚠️ 沒有變更"

          echo "=== 嘗試 push ==="
          git push || echo "⚠️ push 失敗（權限問題，但不中斷）"

          echo "=== commit step 完成 ==="
