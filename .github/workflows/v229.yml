name: run-v229

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas numpy

      - name: Run strategy
        run: python v229_main.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v229_result
          path: |
            v229_nav.csv
            v229_summary.csv
