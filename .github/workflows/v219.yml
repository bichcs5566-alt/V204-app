name: v219

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v219_live_engine.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add v219_*.csv
          git commit -m "run v219" || echo "no changes"
          git push
