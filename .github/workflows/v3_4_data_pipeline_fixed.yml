name: v3_4_data_pipeline_fixed

on:
  workflow_dispatch:
  schedule:
    - cron: "10 11 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Run v3.4 data pipeline fixed
        run: |
          python v1_stable_pipeline.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meta.json trade_plan.csv full_summary.csv performance_summary.csv v3_core_candidates.csv v3_core_debug.csv core_candidates.csv alpha_candidates.csv mobile_dashboard_v1/data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "v3.4 fix data pipeline full summary"
            git push
          fi
