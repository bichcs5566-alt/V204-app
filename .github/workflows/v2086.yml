name: v2086

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v2086_daily_rebuild.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "v208.6 rebuild" || echo "no change"
          git push
