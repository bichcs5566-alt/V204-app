name: v266_2_build_chunk_year

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to build, e.g. 2015"
        required: true
        default: "2015"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Build one year chunk
        run: |
          python v266_2_build_chunk_year.py ${{ github.event.inputs.year }}

      - name: Commit chunk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_chunks/ || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v266.2 build data chunk ${{ github.event.inputs.year }}"
            git push
          fi
