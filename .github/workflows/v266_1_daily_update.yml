name: v266_1_daily_update

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 18:30 = UTC 10:30
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Daily append market data
        run: |
          python v266_1_update_market_data.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Sync dashboard
        run: |
          if [ -f v3_1_dashboard_bridge.py ]; then
            python v3_1_dashboard_bridge.py
          else
            echo "bridge not found, skip"
          fi

      - name: Commit daily outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            price_panel_daily.csv \
            feature_panel_daily.csv \
            data_meta.json \
            feature_meta.json \
            data_guard_report.json \
            trade_plan.csv \
            candidates.csv \
            core_candidates.csv \
            alpha_candidates.csv \
            selection_debug.csv \
            meta.json \
            mobile_dashboard_v1/data/ || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v266.1 daily data and strategy update"
            git push
          fi
