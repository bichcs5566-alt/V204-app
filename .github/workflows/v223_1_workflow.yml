name: v223_1_dual_engine

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run B main
        run: python v223_1_main.py

      - name: Run A observer
        run: python v223_1_A_observer.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: v223_1_output
          path: |
            v223_1_*.csv
          if-no-files-found: error

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v223_1_*.csv
          git diff --cached --quiet || git commit -m "update v223.1"
          git push
