name: v243-final-backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        case:
          - label: y2022
            start: "2022-01-01"
            end: "2022-12-31"
          - label: y2023
            start: "2023-01-01"
            end: "2023-12-31"
          - label: y2024
            start: "2024-01-01"
            end: "2024-12-31"
          - label: y2025
            start: "2025-01-01"
            end: "2025-12-31"
          - label: full
            start: "2022-01-01"
            end: "2025-12-31"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      # 🔥 合併分片（關鍵）
      - name: Merge data
        run: |
          python merge_chunked_price_panel.py

      # 🔥 建 macro（如果沒有）
      - name: Build macro
        run: |
          if [ ! -f macro_signal.csv ]; then
            python v235_macro_updater.py
          fi

      # 🔥 跑回測
      - name: Run backtest
        run: |
          python v243_final_backtest.py \
            --start "${{ matrix.case.start }}" \
            --end "${{ matrix.case.end }}" \
            --label "${{ matrix.case.label }}"

      # 🔍 檢查
      - name: Check files
        run: |
          ls -lh
          test -f "${{ matrix.case.label }}_summary.csv"

      # 📦 上傳結果
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: v243_${{ matrix.case.label }}
          path: |
            ${{ matrix.case.label }}_summary.csv
            ${{ matrix.case.label }}_nav.csv
            ${{ matrix.case.label }}_trades.csv
            ${{ matrix.case.label }}_signals.csv
            ${{ matrix.case.label }}_meta.json
