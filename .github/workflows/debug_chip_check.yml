name: DEBUG CHIP CHECK v266

on:
  workflow_dispatch:

jobs:
  debug-chip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pandas requests

      - name: List files
        run: |
          echo "==== ROOT ===="
          ls -al
          echo "==== mobile_dashboard_v1/data ===="
          ls -al mobile_dashboard_v1/data || true

      - name: Run chip debug
        run: |
          python check_chip_debug.py
