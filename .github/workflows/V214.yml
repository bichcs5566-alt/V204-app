name: v214

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy

      - name: Run v214
        run: |
          python v214_dynamic_portfolio_engine.py

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions"
          git add *.csv
          git commit -m "update v214 results" || echo "no changes"
          git push
