name: build-full-price-panel-10y-repo-ready

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check script exists
        run: |
          test -f build_full_price_panel_10y_repo_ready.py || (echo "Missing build_full_price_panel_10y_repo_ready.py" && exit 1)

      - name: Build full 10y price panel
        env:
          PANEL_START: "2015-01-01"
          PANEL_END: "2026-12-31"
        run: |
          python build_full_price_panel_10y_repo_ready.py

      - name: Check generated files
        run: |
          ls -lah
          test -f price_panel_daily.csv || (echo "Missing price_panel_daily.csv" && exit 1)
          test -f build_price_panel_summary.csv || (echo "Missing build_price_panel_summary.csv" && exit 1)
          test -f build_price_panel_log.txt || (echo "Missing build_price_panel_log.txt" && exit 1)
          test -f symbol_universe.csv || (echo "Missing symbol_universe.csv" && exit 1)

      - name: Commit changes to repo branch and open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: auto update full price panel 10y
          title: Auto update full price panel 10y
          body: |
            This PR was created automatically by GitHub Actions.

            Updated files:
            - price_panel_daily.csv
            - build_price_panel_summary.csv
            - build_price_panel_log.txt
            - symbol_universe.csv
          branch: auto/update-full-price-panel-10y
          delete-branch: true
          base: main
          add-paths: |
            price_panel_daily.csv
            build_price_panel_summary.csv
            build_price_panel_log.txt
            symbol_universe.csv

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price_panel_10y_repo_ready_result
          path: |
            price_panel_daily.csv
            build_price_panel_summary.csv
            build_price_panel_log.txt
            symbol_universe.csv
