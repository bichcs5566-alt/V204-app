name: run-v241-5

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance

      - name: Run macro updater
        run: python v235_macro_updater.py

      - name: Run v241.5
        run: python v241_5_main.py

      - name: Check outputs
        run: |
          ls -lah
          test -f macro_signal.csv
          test -f v241_5_nav.csv
          test -f v241_5_trades.csv
          test -f v241_5_summary.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v241_5_result
          path: |
            macro_signal.csv
            v241_5_nav.csv
            v241_5_trades.csv
            v241_5_summary.csv
