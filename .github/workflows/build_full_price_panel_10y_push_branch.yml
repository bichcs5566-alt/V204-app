name: build-full-price-panel-10y-push-branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check script exists
        run: |
          test -f build_full_price_panel_10y_push_branch.py || (echo "Missing build_full_price_panel_10y_push_branch.py" && exit 1)

      - name: Build full panel and push to new branch
        env:
          PANEL_START: "2015-01-01"
          PANEL_END: "2026-12-31"
        run: |
          python build_full_price_panel_10y_push_branch.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price_panel_10y_push_branch_result
          path: |
            price_panel_daily.csv
            build_price_panel_summary.csv
            build_price_panel_log.txt
            symbol_universe.csv
