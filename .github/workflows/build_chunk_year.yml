name: build_chunk_year

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Start year, e.g. 2015"
        required: true
        default: "2015"
      end_year:
        description: "End year, e.g. 2026"
        required: true
        default: "2026"
      auto_next:
        description: "Auto trigger next year until end_year"
        required: true
        default: "true"

permissions:
  contents: write
  actions: write

concurrency:
  group: build-chunk-year
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Build one year chunk
        run: |
          python build_chunk_year.py ${{ github.event.inputs.year }}

      - name: Commit chunk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data_chunks/ || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "build data chunk ${{ github.event.inputs.year }}"
            git push
          fi

      - name: Trigger next year or merge
        if: ${{ github.event.inputs.auto_next == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          YEAR: ${{ github.event.inputs.year }}
          END_YEAR: ${{ github.event.inputs.end_year }}
        run: |
          NEXT_YEAR=$((YEAR + 1))

          if [ "$NEXT_YEAR" -le "$END_YEAR" ]; then
            echo "Trigger next year: $NEXT_YEAR"
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/$REPO/actions/workflows/build_chunk_year.yml/dispatches \
              -d "{\"ref\":\"$REF\",\"inputs\":{\"year\":\"$NEXT_YEAR\",\"end_year\":\"$END_YEAR\",\"auto_next\":\"true\"}}"
          else
            echo "All chunks completed. Trigger merge_chunks."
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/$REPO/actions/workflows/merge_chunks.yml/dispatches \
              -d "{\"ref\":\"$REF\"}"
          fi
