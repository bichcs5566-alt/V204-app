name: run-v231-2

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      # 🔥 強化版 macro
      - name: Update Macro v231.2
        run: python v231_2_macro_updater.py

      - name: Run Strategy
        run: python v231_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: v231_2_result
          path: |
            macro_signal.csv
            v231_nav.csv
            v231_summary.csv
            v231_diagnostics.csv
