name: build-full-price-panel-10y

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance requests

      - name: Run builder
        run: python build_full_price_panel_10y.py

      - name: Check outputs
        run: |
          ls -lah
          test -f price_panel_daily.csv
          test -f build_price_panel_summary.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: price_panel_10y_result
          path: |
            price_panel_daily.csv
            build_price_panel_summary.csv
            build_price_panel_log.txt
