name: v3_position_writeback

on:
  workflow_dispatch:

jobs:
  writeback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position writeback
        run: python v3_position_writeback.py

      - name: Commit & Push (safe mode)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add mobile_dashboard_v1/data/current_positions.csv

          git commit -m "v3.2.1 position writeback" || echo "no changes"

          # ✅ 關鍵：避免衝突
          git pull --rebase origin main || git rebase --abort

          git push origin main || (
            git pull origin main --no-rebase &&
            git push origin main
          )
