# v265_decision_engine.yml.txt
name: v265-decision-engine

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Merge price panel
        run: |
          python merge_chunked_price_panel.py

      - name: Run decision engine
        run: |
          python v265_decision_engine.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: v265-results
          path: |
            daily_nav.csv
            full_summary.csv
            trade_plan.csv
            core_candidates.csv
            alpha_candidates.csv
