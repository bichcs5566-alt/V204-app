name: run-v235

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy yfinance

      - name: Run macro updater
        run: python v235_macro_updater.py

      - name: Run main
        run: python v235_main.py

      - name: Check output files
        run: |
          ls -lah
          test -f macro_signal.csv
          test -f v235_nav.csv
          test -f v235_summary.csv

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v235_result
          path: |
            macro_signal.csv
            v235_nav.csv
            v235_summary.csv

