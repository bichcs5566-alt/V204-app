name: run-v235

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy yfinance

      - run: python v235_macro_updater.py
      - run: python v235_main.py

      # 🔥 這段就是你缺的
      - uses: actions/upload-artifact@v4
        with:
          name: v235_result
          path: |
            v235_nav.csv
            v235_summary.csv
            macro_signal.csv
