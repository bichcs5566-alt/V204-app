name: v266-10.2-pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    concurrency:
      group: v266-10-2-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v266.10.2 unified pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: bichcs5566-alt/V204-app
        run: |
          python v266_10_2_pipeline_runner.py
