name: v4_auto_update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"   # 台灣 18:00

jobs:
  run-v4:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install packages
        run: |
          pip install pandas numpy

      - name: run v4 strategy
        run: |
          python v4_0_core_logic.py

      - name: commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add mobile_dashboard_v1/data/trade_plan.csv
          git add mobile_dashboard_v1/data/selection_debug.csv
          git commit -m "v4 update" || echo "no changes"
          git push
