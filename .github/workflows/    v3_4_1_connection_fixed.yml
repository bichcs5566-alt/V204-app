name: v3_4_1_connection_fixed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests
          fi

      - name: Update market data
        run: |
          if [ -f update_market_data.py ]; then
            python update_market_data.py
          else
            echo "update_market_data.py not found, skip"
          fi

      - name: Run main pipeline
        run: |
          python v1_stable_pipeline.py

      - name: Run dashboard bridge
        run: |
          if [ -f v3_1_dashboard_bridge.py ]; then
            python v3_1_dashboard_bridge.py
          else
            echo "v3_1_dashboard_bridge.py not found, skip"
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            meta.json \
            trade_plan.csv \
            position_monitor.csv \
            watchlist_monitor.csv \
            full_summary.csv \
            performance_summary.csv \
            selection_debug.csv \
            v3_core_candidates.csv \
            v3_core_debug.csv \
            core_candidates.csv \
            alpha_candidates.csv \
            current_positions.csv \
            watchlist.csv \
            mobile_dashboard_v1/data/trade_plan.csv \
            mobile_dashboard_v1/data/position_monitor.csv \
            mobile_dashboard_v1/data/watchlist_monitor.csv \
            mobile_dashboard_v1/data/full_summary.csv \
            mobile_dashboard_v1/data/performance_summary.csv \
            mobile_dashboard_v1/data/selection_debug.csv \
            mobile_dashboard_v1/data/v3_core_candidates.csv \
            mobile_dashboard_v1/data/v3_core_debug.csv \
            mobile_dashboard_v1/data/core_candidates.csv \
            mobile_dashboard_v1/data/alpha_candidates.csv \
            mobile_dashboard_v1/data/current_positions.csv \
            mobile_dashboard_v1/data/watchlist.csv \
            mobile_dashboard_v1/data/meta.json || true

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v3.4.1 connection fixed"
            git push origin HEAD:main
          fi
