name: run-v230-1

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas numpy

      - name: Run strategy
        run: python v230_1_main.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v230_1_result
          path: |
            v230_1_nav.csv
            v230_1_summary.csv
            v230_1_diagnostics.csv
