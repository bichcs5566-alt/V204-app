name: v2161

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run v216.1 validation
        run: |
          python v2161_weight_engine_validation.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2161_weight_engine_validation.py .github/workflows/v2161.yml \
                  v2161_daily_nav.csv v2161_window_summary.csv v2161_trade_stats.csv v2161_summary.csv || true
          git diff --cached --quiet || git commit -m "run v216.1 validation"
          git push
