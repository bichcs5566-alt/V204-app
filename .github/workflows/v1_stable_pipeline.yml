name: v2_7_pipeline

on:
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas

      - name: Update market data
        run: python update_market_data.py

      - name: Run main pipeline
        run: python v1_stable_pipeline.py

      - name: Sync dashboard
        run: |
          mkdir -p mobile_dashboard_v1/data
          cp meta.json mobile_dashboard_v1/data/meta.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "v2.7 update market data"
          git push || echo "no changes"
