name: v248-control-drawdown

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install pandas numpy

      - name: Run backtest
        run: |
          python v248_control_drawdown.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            full_nav.csv
            full_summary.csv
