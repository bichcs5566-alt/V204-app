name: v248-control-drawdown

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Merge price panel
        run: |
          python merge_chunked_price_panel.py

      - name: Build macro if missing
        run: |
          if [ ! -f macro_signal.csv ]; then
            python v235_macro_updater.py
          fi

      - name: Run backtest
        run: |
          python v248_control_drawdown.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v248_results
          path: |
            full_nav.csv
            full_summary.csv
