name: run-v231-3

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy

      - run: python v231_2_macro_updater.py
      - run: python v231_3_main.py

      - uses: actions/upload-artifact@v4
        with:
          name: v231_3_result
          path: |
            v231_3_nav.csv
            v231_3_summary.csv
