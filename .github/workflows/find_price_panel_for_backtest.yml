name: find-price-panel-for-backtest

on:
  workflow_dispatch:

jobs:
  find-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Check finder script
        run: |
          test -f find_price_panel_for_backtest.py || (echo 'Missing find_price_panel_for_backtest.py' && exit 1)

      - name: Search repo for full price panel
        run: python find_price_panel_for_backtest.py

      - name: Show selected output
        run: |
          ls -lah
          test -f price_panel_daily.csv || (echo 'price_panel_daily.csv not created' && exit 1)
          test -f price_panel_search_report.csv || (echo 'price_panel_search_report.csv not created' && exit 1)

      - name: Upload search result
        uses: actions/upload-artifact@v4
        with:
          name: found-price-panel-report
          path: |
            price_panel_daily.csv
            price_panel_search_report.csv
