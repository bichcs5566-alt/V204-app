name: v266-10-watchlist-writeback

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: "upsert or delete"
        required: true
        type: string
      stock_id:
        description: "stock id"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  run_writeback:
    runs-on: ubuntu-latest
    concurrency:
      group: v266-10-2-watch
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run watchlist writeback
        env:
          ACTION_TYPE: ${{ github.event.inputs.action_type }}
          STOCK_ID: ${{ github.event.inputs.stock_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: bichcs5566-alt/V204-app
        run: |
          python v266_10_watchlist_writeback.py
