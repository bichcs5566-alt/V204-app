name: v3_watchlist_writeback

on:
  workflow_dispatch:
    inputs:
      action:
        description: "add or remove"
        required: true
        type: choice
        options:
          - add
          - remove
      stock_id:
        description: "stock id"
        required: true

jobs:
  writeback:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run watchlist writeback
        run: |
          python v3_watchlist_writeback.py \
            --action "${{ github.event.inputs.action }}" \
            --stock_id "${{ github.event.inputs.stock_id }}"

      - name: Commit & Push (safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main
          git add mobile_dashboard_v1/data/watchlist.csv
          git commit -m "watchlist update" || echo "no changes"
          git push origin main
