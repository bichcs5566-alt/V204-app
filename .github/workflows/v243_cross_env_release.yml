name: v243-full-pipeline

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pandas numpy yfinance requests

      # 🟢 Step 1：先建資料（關鍵）
      - name: Build 10y data
        run: |
          python build_full_price_panel_10y.py

      # 🟢 Step 2：建 macro（如果沒有）
      - name: Build macro if needed
        run: |
          if [ ! -f macro_signal.csv ]; then
            python v235_macro_updater.py
          fi

      # 🟢 Step 3：直接跑 v243
      - name: Run v243 full
        run: |
          python v243_official_release_main.py \
          --start 2022-01-01 \
          --end 2025-12-31

      # 🟢 Step 4：確認輸出
      - name: Check outputs
        run: |
          ls -lah
          test -f v243_summary.csv

      # 🟢 Step 5：只上傳結果（小檔）
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v243_result
          path: |
            v243_summary.csv
            v243_nav.csv
            v243_trades.csv
            v243_meta.json
