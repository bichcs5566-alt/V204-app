name: v243-minimal-run

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check files
        run: |
          ls -lah
          test -f v243_official_release_main.py
          test -f price_panel_daily.csv

      - name: Build macro if needed
        run: |
          if [ ! -f macro_signal.csv ]; then
            python v235_macro_updater.py
          fi

      - name: Run v243 full
        run: |
          python v243_official_release_main.py --start 2022-01-01 --end 2025-12-31

      - name: Check outputs
        run: |
          ls -lah
          test -f v243_summary.csv
          test -f v243_nav.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v243_full_result
          path: |
            v243_summary.csv
            v243_nav.csv
            v243_trades.csv
            v243_signals.csv
            v243_daily_positions.csv
            v243_meta.json
