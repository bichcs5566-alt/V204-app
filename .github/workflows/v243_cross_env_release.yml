name: v243-cross-env-release

on:
  workflow_dispatch:

jobs:
  cross_env_backtest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
        period:
          - name: y2022
            start: 2022-01-01
            end: 2022-12-31
          - name: y2023
            start: 2023-01-01
            end: 2023-12-31
          - name: y2024
            start: 2024-01-01
            end: 2024-12-31
          - name: y2025
            start: 2025-01-01
            end: 2025-12-31
          - name: full_2022_2025
            start: 2022-01-01
            end: 2025-12-31

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Verify required files
        shell: bash
        run: |
          test -f v243_official_release_main.py || (echo "Missing v243_official_release_main.py" && exit 1)
          test -f price_panel_daily.csv || (echo "Missing price_panel_daily.csv" && exit 1)
          if [ ! -f macro_signal.csv ] && [ ! -f v235_macro_updater.py ]; then
            echo "Need macro_signal.csv or v235_macro_updater.py"
            exit 1
          fi

      - name: Build macro file if needed
        shell: bash
        run: |
          if [ -f macro_signal.csv ]; then
            echo "Using existing macro_signal.csv"
          else
            python v235_macro_updater.py
          fi
          test -f macro_signal.csv || (echo "macro_signal.csv not generated" && exit 1)

      - name: Show data coverage
        run: |
          python - <<'PY'
          import pandas as pd
          df = pd.read_csv('price_panel_daily.csv')
          df.columns = [str(c).lower().strip() for c in df.columns]
          date_col = next((c for c in ['trade_date','date','datetime','signal_date'] if c in df.columns), None)
          if date_col is None:
              raise SystemExit('price_panel_daily.csv ç¼ºå°æ¥ææ¬ä½')
          dt = pd.to_datetime(df[date_col], errors='coerce').dropna()
          print('price min_date =', dt.min().date())
          print('price max_date =', dt.max().date())
          print('price rows     =', len(df))
          print('price symbols  =', df['symbol'].astype(str).nunique() if 'symbol' in df.columns else 'NA')
          PY

      - name: Run v243 backtest
        run: >
          python v243_official_release_main.py
          --price price_panel_daily.csv
          --macro macro_signal.csv
          --start ${{ matrix.period.start }}
          --end ${{ matrix.period.end }}
          --output-prefix v243_${{ matrix.os }}_${{ matrix.period.name }}

      - name: Verify outputs
        shell: bash
        run: |
          base="v243_${{ matrix.os }}_${{ matrix.period.name }}"
          test -f "${base}_nav.csv" || (echo "Missing nav" && exit 1)
          test -f "${base}_trades.csv" || (echo "Missing trades" && exit 1)
          test -f "${base}_signals.csv" || (echo "Missing signals" && exit 1)
          test -f "${base}_daily_positions.csv" || (echo "Missing daily_positions" && exit 1)
          test -f "${base}_summary.csv" || (echo "Missing summary" && exit 1)
          test -f "${base}_meta.json" || (echo "Missing meta" && exit 1)

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v243_${{ matrix.os }}_${{ matrix.period.name }}
          path: |
            v243_${{ matrix.os }}_${{ matrix.period.name }}_nav.csv
            v243_${{ matrix.os }}_${{ matrix.period.name }}_trades.csv
            v243_${{ matrix.os }}_${{ matrix.period.name }}_signals.csv
            v243_${{ matrix.os }}_${{ matrix.period.name }}_daily_positions.csv
            v243_${{ matrix.os }}_${{ matrix.period.name }}_summary.csv
            v243_${{ matrix.os }}_${{ matrix.period.name }}_meta.json
