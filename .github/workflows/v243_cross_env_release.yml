name: v243-cross-env-release

on:
  workflow_dispatch:

jobs:
  backtest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        period: [y2022, y2023, y2024, y2025, full]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check required files
        shell: bash
        run: |
          test -f v243_official_release_main.py || (echo 'Missing v243_official_release_main.py' && exit 1)
          test -f price_panel_daily.csv || (echo 'Missing price_panel_daily.csv' && exit 1)

      - name: Build macro file if missing
        shell: bash
        run: |
          if [ ! -f macro_signal.csv ]; then
            if [ -f v235_macro_updater.py ]; then
              echo 'macro_signal.csv missing, running v235_macro_updater.py'
              python v235_macro_updater.py
            else
              echo 'macro_signal.csv and v235_macro_updater.py both missing'
              exit 1
            fi
          fi
          test -f macro_signal.csv || (echo 'macro_signal.csv still missing after build step' && exit 1)

      - name: Set period arguments
        id: period_args
        shell: bash
        run: |
          if [ "${{ matrix.period }}" = "y2022" ]; then
            echo "start=2022-01-01" >> "$GITHUB_OUTPUT"
            echo "end=2022-12-31" >> "$GITHUB_OUTPUT"
            echo "label=2022" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.period }}" = "y2023" ]; then
            echo "start=2023-01-01" >> "$GITHUB_OUTPUT"
            echo "end=2023-12-31" >> "$GITHUB_OUTPUT"
            echo "label=2023" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.period }}" = "y2024" ]; then
            echo "start=2024-01-01" >> "$GITHUB_OUTPUT"
            echo "end=2024-12-31" >> "$GITHUB_OUTPUT"
            echo "label=2024" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.period }}" = "y2025" ]; then
            echo "start=2025-01-01" >> "$GITHUB_OUTPUT"
            echo "end=2025-12-31" >> "$GITHUB_OUTPUT"
            echo "label=2025" >> "$GITHUB_OUTPUT"
          else
            echo "start=2022-01-01" >> "$GITHUB_OUTPUT"
            echo "end=2025-12-31" >> "$GITHUB_OUTPUT"
            echo "label=2022_2025_full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run v243 backtest
        run: >-
          python v243_official_release_main.py
          --start ${{ steps.period_args.outputs.start }}
          --end ${{ steps.period_args.outputs.end }}
          --prefix v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}

      - name: Check outputs
        shell: bash
        run: |
          ls -lah
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_nav.csv || (echo 'Missing nav output' && exit 1)
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_trades.csv || (echo 'Missing trades output' && exit 1)
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_signals.csv || (echo 'Missing signals output' && exit 1)
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_daily_positions.csv || (echo 'Missing daily_positions output' && exit 1)
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_summary.csv || (echo 'Missing summary output' && exit 1)
          test -f v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_meta.csv || (echo 'Missing meta output' && exit 1)

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}
          path: |
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_nav.csv
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_trades.csv
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_signals.csv
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_daily_positions.csv
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_summary.csv
            v243_${{ steps.period_args.outputs.label }}_${{ matrix.os }}_meta.csv
            macro_signal.csv
