name: run-v226-a

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run v226 A
        run: |
          python v226_A_main.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: v226-a-result
          path: |
            v226_A_nav.csv
            v226_A_summary.csv
            v226_A_trades.csv
            v226_A_trade_stats.csv
          if-no-files-found: error
