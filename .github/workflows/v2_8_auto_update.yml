name: v2_8_auto_update

on:
  workflow_dispatch:
  schedule:
    - cron: '7 11 * * 1-5'   # 台灣 19:07

permissions:
  contents: write

concurrency:
  group: v2_8_auto_update
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Remove stale single-day price panel
        run: |
          rm -f price_panel_daily.csv
          rm -f mobile_dashboard_v1/data/price_panel_daily.csv

      - name: Merge historical price panel
        run: |
          test -f merge_chunked_price_panel.py || (echo "Missing merge_chunked_price_panel.py" && exit 1)
          test -d data/price_panel_parts || (echo "Missing data/price_panel_parts" && exit 1)
          test -f data/price_panel_parts/manifest.json || (echo "Missing data/price_panel_parts/manifest.json" && exit 1)
          python merge_chunked_price_panel.py

      - name: Normalize merged price panel
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          p = Path("price_panel_daily.csv")
          if not p.exists():
              raise SystemExit("price_panel_daily.csv not found after merge")

          df = pd.read_csv(p)
          print("before columns:", list(df.columns))
          print("before rows:", len(df))

          if "trade_date" in df.columns and "date" not in df.columns:
              df = df.rename(columns={"trade_date": "date"})
          if "symbol" in df.columns and "stock_id" not in df.columns:
              df = df.rename(columns={"symbol": "stock_id"})

          required = ["date", "stock_id", "close"]
          missing = [c for c in required if c not in df.columns]
          if missing:
              raise SystemExit(f"missing required columns: {missing}; columns={list(df.columns)}")

          df["date"] = pd.to_datetime(df["date"], errors="coerce")
          df["stock_id"] = df["stock_id"].astype(str).str.strip()
          df["close"] = pd.to_numeric(df["close"], errors="coerce")
          if "volume" in df.columns:
              df["volume"] = pd.to_numeric(df["volume"], errors="coerce")

          df = df.dropna(subset=["date", "stock_id", "close"])
          df = df[df["close"] > 0].copy()
          df["date"] = df["date"].dt.strftime("%Y-%m-%d")

          front = ["date", "stock_id", "close"]
          rest = [c for c in df.columns if c not in front]
          df = df[front + rest].sort_values(["stock_id", "date"])

          days = df["date"].nunique()
          stocks = df["stock_id"].nunique()
          print("after rows:", len(df))
          print("unique dates:", days)
          print("unique stocks:", stocks)

          if days < 60:
              raise SystemExit(f"歷史資料天數不足：{days}")
          if stocks < 100:
              raise SystemExit(f"股票數過少：{stocks}")

          df.to_csv(p, index=False, encoding="utf-8-sig")
          PY

      - name: Run v1 stable pipeline
        run: |
          python v1_stable_pipeline.py

      - name: Run Position Engine
        run: |
          test -f position_engine_v1.py || (echo "Missing position_engine_v1.py" && exit 1)
          python position_engine_v1.py

      - name: Verify v1 outputs safely
        run: |
          test -f mobile_dashboard_v1/data/meta.json
          test -f mobile_dashboard_v1/data/trade_plan.csv
          test -f mobile_dashboard_v1/data/full_summary.csv
          test -f mobile_dashboard_v1/data/selection_debug.csv

          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          from pandas.errors import EmptyDataError

          def safe_read_csv(path, required=False):
              p = Path(path)
              if not p.exists():
                  if required:
                      raise SystemExit(f"missing required file: {path}")
                  print(f"WARN missing optional file: {path}")
                  return None

              if p.stat().st_size == 0:
                  if required:
                      raise SystemExit(f"required file is empty: {path}")
                  print(f"WARN empty optional file: {path}")
                  return None

              try:
                  df = pd.read_csv(p)
                  print(path, "rows:", len(df), "columns:", list(df.columns))
                  return df
              except EmptyDataError:
                  if required:
                      raise SystemExit(f"required file has no columns: {path}")
                  print(f"WARN no columns optional file: {path}")
                  return None

          dbg = safe_read_csv("mobile_dashboard_v1/data/selection_debug.csv", required=True)

          if "valid_after_na" not in dbg.columns:
              raise SystemExit("selection_debug.csv missing valid_after_na")

          v = int(dbg["valid_after_na"].iloc[-1])
          if v <= 0:
              raise SystemExit("valid_after_na is still 0; v1 did not use historical panel")

          tp = safe_read_csv("mobile_dashboard_v1/data/trade_plan.csv", required=True)
          if "suggested_amount" not in tp.columns:
              raise SystemExit("Position Engine failed: trade_plan.csv missing suggested_amount")
          if "target_weight" not in tp.columns:
              raise SystemExit("Position Engine failed: trade_plan.csv missing target_weight")

          safe_read_csv("mobile_dashboard_v1/data/position_monitor.csv", required=False)
          safe_read_csv("mobile_dashboard_v1/data/watchlist_monitor.csv", required=False)
          safe_read_csv("mobile_dashboard_v1/data/full_summary.csv", required=False)
          safe_read_csv("mobile_dashboard_v1/data/core_candidates.csv", required=False)
          safe_read_csv("mobile_dashboard_v1/data/alpha_candidates.csv", required=False)

          print("Position Engine OK")
          PY

      - name: Remove temporary huge price panel
        run: |
          rm -f price_panel_daily.csv
          rm -f mobile_dashboard_v1/data/price_panel_daily.csv
          git checkout -- price_panel_daily.csv mobile_dashboard_v1/data/price_panel_daily.csv 2>/dev/null || true
          git reset -- price_panel_daily.csv mobile_dashboard_v1/data/price_panel_daily.csv 2>/dev/null || true

      - name: Commit dashboard outputs only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mobile_dashboard_v1/data/meta.json
          git add mobile_dashboard_v1/data/trade_plan.csv
          git add mobile_dashboard_v1/data/position_monitor.csv || true
          git add mobile_dashboard_v1/data/watchlist_monitor.csv || true
          git add mobile_dashboard_v1/data/full_summary.csv || true
          git add mobile_dashboard_v1/data/selection_debug.csv
          git add mobile_dashboard_v1/data/core_candidates.csv || true
          git add mobile_dashboard_v1/data/alpha_candidates.csv || true
          git add mobile_dashboard_v1/data/position_engine_summary.json || true

          git add meta.json trade_plan.csv position_monitor.csv watchlist_monitor.csv full_summary.csv selection_debug.csv core_candidates.csv alpha_candidates.csv position_engine_summary.json || true

          git reset -- price_panel_daily.csv mobile_dashboard_v1/data/price_panel_daily.csv 2>/dev/null || true

          git status --short

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v2.8 auto update using historical panel with position engine"
            git pull --rebase origin main || git pull origin main --no-rebase
            git push origin HEAD:main
          fi
