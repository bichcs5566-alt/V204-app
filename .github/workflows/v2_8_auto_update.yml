name: v2_8_1_update_price_panel_parts

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v2_8_1_update_price_panel_parts
  cancel-in-progress: false

jobs:
  update_parts:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Check required scripts
        run: |
          test -f build_full_price_panel_10y_chunked_branch_only.py || (echo "Missing build_full_price_panel_10y_chunked_branch_only.py" && exit 1)
          test -f merge_chunked_price_panel.py || (echo "Missing merge_chunked_price_panel.py" && exit 1)

      # 只更新歷史行情分片，不動 v1 主策略、不動前端。
      - name: Build full 10y price panel parts
        env:
          PANEL_START: "2015-01-01"
          PANEL_END: "2026-12-31"
          MAX_PART_MB: "85"
        run: |
          python build_full_price_panel_10y_chunked_branch_only.py

      - name: Verify generated parts
        run: |
          test -d data/price_panel_parts || (echo "Missing data/price_panel_parts" && exit 1)
          test -f data/price_panel_parts/manifest.json || (echo "Missing manifest.json" && exit 1)
          test -f build_price_panel_summary.csv || (echo "Missing build_price_panel_summary.csv" && exit 1)
          test -f build_price_panel_log.txt || (echo "Missing build_price_panel_log.txt" && exit 1)
          test -f symbol_universe.csv || (echo "Missing symbol_universe.csv" && exit 1)

      # 防呆：確認分片可以合併，且不是單日資料。
      - name: Test merge parts locally
        run: |
          python merge_chunked_price_panel.py
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          p = Path("price_panel_daily.csv")
          if not p.exists():
              raise SystemExit("merge failed: price_panel_daily.csv not found")

          df = pd.read_csv(p)
          print("merged rows:", len(df))
          print("columns:", list(df.columns))

          date_col = "date" if "date" in df.columns else "trade_date" if "trade_date" in df.columns else None
          symbol_col = "stock_id" if "stock_id" in df.columns else "symbol" if "symbol" in df.columns else None

          if date_col is None or symbol_col is None or "close" not in df.columns:
              raise SystemExit("merged panel missing date/symbol/close compatible columns")

          days = df[date_col].astype(str).nunique()
          stocks = df[symbol_col].astype(str).nunique()

          print("unique dates:", days)
          print("unique stocks:", stocks)

          if days < 60:
              raise SystemExit(f"historical panel too short: only {days} dates")
          if stocks < 100:
              raise SystemExit(f"stock universe abnormal: only {stocks} stocks")

          # 不提交巨大合併檔，只提交分片。
          p.unlink(missing_ok=True)
          PY

      - name: Commit updated price panel parts to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/price_panel_parts
          git add build_price_panel_summary.csv build_price_panel_log.txt symbol_universe.csv merge_chunked_price_panel.py

          # 防呆：不要提交巨大合併檔
          git reset -- price_panel_daily.csv 2>/dev/null || true
          rm -f price_panel_daily.csv

          git status --short

          if git diff --cached --quiet; then
            echo "no price panel part changes to commit"
          else
            git commit -m "v2.8.1 update historical price panel parts"
            git pull --rebase origin main || git pull origin main --no-rebase
            git push origin HEAD:main
          fi
