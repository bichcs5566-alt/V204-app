name: v2_8_auto_update

on:
  workflow_dispatch:
  schedule:
    - cron: '7 11 * * 1-5'   # 台灣 19:07

permissions:
  contents: write

concurrency:
  group: v2_8_auto_update
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Merge historical price panel
        run: |
          test -f merge_chunked_price_panel.py || (echo "Missing merge_chunked_price_panel.py" && exit 1)
          test -d data/price_panel_parts || (echo "Missing data/price_panel_parts" && exit 1)
          test -f data/price_panel_parts/manifest.json || (echo "Missing data/price_panel_parts/manifest.json" && exit 1)
          python merge_chunked_price_panel.py

      # 關鍵修補：
      # merge 出來的歷史資料欄位是 trade_date / symbol。
      # v1 主程式要吃 date / stock_id / close。
      # 這一步只做欄位標準化，不改策略。
      - name: Normalize price panel columns
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          path = Path("price_panel_daily.csv")
          if not path.exists():
              raise SystemExit("Missing price_panel_daily.csv after merge")

          df = pd.read_csv(path)
          print("before columns:", list(df.columns))
          print("before rows:", len(df))

          rename = {}
          if "trade_date" in df.columns and "date" not in df.columns:
              rename["trade_date"] = "date"
          if "symbol" in df.columns and "stock_id" not in df.columns:
              rename["symbol"] = "stock_id"

          df = df.rename(columns=rename)

          need = ["date", "stock_id", "close"]
          missing = [c for c in need if c not in df.columns]
          if missing:
              raise SystemExit(f"price_panel_daily.csv missing required columns after normalize: {missing}; columns={list(df.columns)}")

          df["date"] = df["date"].astype(str).str[:10]
          df["stock_id"] = df["stock_id"].astype(str).str.strip()
          df["close"] = pd.to_numeric(df["close"], errors="coerce")

          if "volume" in df.columns:
              df["volume"] = pd.to_numeric(df["volume"], errors="coerce").fillna(0)

          df = df[df["stock_id"].notna() & (df["stock_id"] != "")]
          df = df[df["close"].notna()]

          # 保留原欄位，但把 v1 必要欄位排前面
          front = ["date", "stock_id", "close"]
          rest = [c for c in df.columns if c not in front]
          df = df[front + rest]

          df.to_csv(path, index=False)

          # 同步一份到 dashboard data，避免前端或其他流程讀不同位置
          out_dir = Path("mobile_dashboard_v1/data")
          out_dir.mkdir(parents=True, exist_ok=True)
          df.to_csv(out_dir / "price_panel_daily.csv", index=False)

          print("after columns:", list(df.columns))
          print("after rows:", len(df))
          print("unique dates:", df["date"].nunique())
          print("unique stocks:", df["stock_id"].nunique())
          PY

      - name: Verify merged price panel
        run: |
          test -f price_panel_daily.csv || (echo "Missing price_panel_daily.csv after normalize" && exit 1)
          python - <<'PY'
          import pandas as pd

          df = pd.read_csv("price_panel_daily.csv")
          print("price_panel rows:", len(df))
          print("columns:", list(df.columns))

          required = ["date", "stock_id", "close"]
          missing = [c for c in required if c not in df.columns]
          if missing:
              raise SystemExit(f"missing columns: {missing}")

          days = df["date"].astype(str).nunique()
          stocks = df["stock_id"].astype(str).nunique()
          print("unique dates:", days)
          print("unique stocks:", stocks)

          if days < 20:
              raise SystemExit(f"price_panel_daily.csv has only {days} unique dates; need historical panel")
          if stocks < 100:
              raise SystemExit(f"price_panel_daily.csv has only {stocks} stocks; data abnormal")
          PY

      - name: Run main pipeline
        run: |
          python v1_stable_pipeline.py

      - name: Verify strategy outputs
        run: |
          test -f mobile_dashboard_v1/data/meta.json
          test -f mobile_dashboard_v1/data/trade_plan.csv
          test -f mobile_dashboard_v1/data/position_monitor.csv
          test -f mobile_dashboard_v1/data/full_summary.csv
          test -f mobile_dashboard_v1/data/selection_debug.csv

          python - <<'PY'
          import pandas as pd

          dbg = pd.read_csv("mobile_dashboard_v1/data/selection_debug.csv")
          print(dbg.to_string(index=False))

          if "valid_after_na" in dbg.columns:
              v = int(dbg["valid_after_na"].iloc[-1])
              if v <= 0:
                  raise SystemExit("valid_after_na is 0; indicators still invalid")

          for path in [
              "mobile_dashboard_v1/data/core_candidates.csv",
              "mobile_dashboard_v1/data/alpha_candidates.csv",
              "mobile_dashboard_v1/data/trade_plan.csv",
          ]:
              try:
                  df = pd.read_csv(path)
                  print(path, "rows:", len(df))
              except Exception as e:
                  print(path, "read failed:", e)
          PY

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add price_panel_daily.csv || true
          git add mobile_dashboard_v1/data/price_panel_daily.csv || true
          git add mobile_dashboard_v1/data/meta.json
          git add mobile_dashboard_v1/data/trade_plan.csv
          git add mobile_dashboard_v1/data/position_monitor.csv
          git add mobile_dashboard_v1/data/watchlist_monitor.csv || true
          git add mobile_dashboard_v1/data/full_summary.csv
          git add mobile_dashboard_v1/data/selection_debug.csv
          git add mobile_dashboard_v1/data/core_candidates.csv || true
          git add mobile_dashboard_v1/data/alpha_candidates.csv || true

          git add meta.json trade_plan.csv position_monitor.csv watchlist_monitor.csv full_summary.csv selection_debug.csv core_candidates.csv alpha_candidates.csv || true

          git status --short

          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "v2.8 auto update from normalized historical price panel"
            git pull --rebase origin main || git pull origin main --no-rebase
            git push origin HEAD:main
          fi
