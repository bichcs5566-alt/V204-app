name: v2_8_auto_update

on:
  workflow_dispatch:
  schedule:
    - cron: '7 11 * * 1-5'   # 台灣 19:07

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests

      # 🔥 核心修補：直接跑 v1
      - name: Run FULL pipeline (v1)
        run: python v1_stable_pipeline.py

      # 🔥 寫回 GitHub（安全版，不動你原本邏輯）
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "auto update data & strategy (v2.8.2 hotfix)" || echo "No changes"

          git pull --rebase || true
          git push
