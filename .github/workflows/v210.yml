# =========================================================
# 檔案 1：.github/workflows/v210.yml
# =========================================================
name: v210

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy

      - name: Run v210 rebuild
        shell: bash
        run: |
          python v210_daily_positions_history.py

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "v210 daily positions history rebuild"
            git push origin main
          fi
