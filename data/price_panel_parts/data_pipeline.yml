name: data_pipeline

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 19:00 = UTC 11:00
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Merge price panel parts into runtime file
        run: |
          python merge_price_panel_parts_runtime.py

      - name: Backfill missing days
        run: |
          python backfill_missing_days.py

      - name: Build features
        run: |
          python v266_build_features.py

      - name: Run pre-move engine
        run: |
          python pre_move_engine.py
          python pre_move_dashboard_patch.py

      - name: Run data guard
        run: |
          python v266_data_guard.py

      - name: Run strategy
        run: |
          python v266_strategy_engine.py

      - name: Run timing engine
        run: |
          if [ -f feature_timing_engine.py ]; then
            python feature_timing_engine.py
          else
            echo "feature_timing_engine.py not found, skip"
          fi

      - name: Run trading system allocator
        run: |
          if [ -f trading_system_allocator.py ]; then
            python trading_system_allocator.py
          else
            echo "trading_system_allocator.py not found, skip"
          fi

      - name: Run exit risk engine
        run: |
          if [ -f exit_risk_engine.py ]; then
            python exit_risk_engine.py
          else
            echo "exit_risk_engine.py not found, skip"
          fi

      - name: Run position overlay engine
        run: |
          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          else
            echo "position_overlay_engine.py not found, skip"
          fi

      - name: Run final decision engine
        run: |
          if [ -f final_decision_engine.py ]; then
            python final_decision_engine.py
          else
            echo "final_decision_engine.py not found, skip"
          fi

      - name: Sync dashboard
        run: |
          if [ -f v3_1_dashboard_bridge.py ]; then
            python v3_1_dashboard_bridge.py
          else
            echo "bridge not found, skip"
          fi

      - name: Keep dashboard files after bridge
        run: |
          if [ -f pre_move_dashboard_patch.py ]; then
            python pre_move_dashboard_patch.py
          fi
          if [ -f feature_timing_engine.py ]; then
            python feature_timing_engine.py
          fi
          if [ -f trading_system_allocator.py ]; then
            python trading_system_allocator.py
          fi
          if [ -f exit_risk_engine.py ]; then
            python exit_risk_engine.py
          fi
          if [ -f position_overlay_engine.py ]; then
            python position_overlay_engine.py
          fi
          if [ -f final_decision_engine.py ]; then
            python final_decision_engine.py
          fi

      - name: Clean big files
        run: |
          rm -f price_panel_daily.csv
          rm -f feature_panel_daily.csv
          rm -f raw_market_daily.csv
          rm -f mobile_dashboard_v1/data/price_panel_daily.csv
          rm -f mobile_dashboard_v1/data/feature_panel_daily.csv
          rm -f mobile_dashboard_v1/data/raw_market_daily.csv

      - name: Commit small files only
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add \
            data_meta.json \
            feature_meta.json \
            data_guard_report.json \
            backfill_report.json \
            trade_plan.csv \
            candidates.csv \
            core_candidates.csv \
            alpha_candidates.csv \
            selection_debug.csv \
            meta.json \
            pre_move_candidates.csv \
            pre_move_summary.json \
            timing_candidates.csv \
            timing_summary.json \
            trading_system_plan.csv \
            trading_system_summary.json \
            exit_risk_plan.csv \
            exit_risk_summary.json \
            final_action_plan.csv \
            final_action_summary.json \
            position_overlay.csv \
            manual_positions.csv \
            mobile_dashboard_v1/data/meta.json \
            mobile_dashboard_v1/data/trade_plan.csv \
            mobile_dashboard_v1/data/candidates.csv \
            mobile_dashboard_v1/data/core_candidates.csv \
            mobile_dashboard_v1/data/alpha_candidates.csv \
            mobile_dashboard_v1/data/selection_debug.csv \
            mobile_dashboard_v1/data/data_guard_report.json \
            mobile_dashboard_v1/data/backfill_report.json \
            mobile_dashboard_v1/data/data_meta.json \
            mobile_dashboard_v1/data/feature_meta.json \
            mobile_dashboard_v1/data/pre_move_candidates.csv \
            mobile_dashboard_v1/data/pre_move_summary.json \
            mobile_dashboard_v1/data/pre_move_cards.json \
            mobile_dashboard_v1/data/timing_candidates.csv \
            mobile_dashboard_v1/data/timing_summary.json \
            mobile_dashboard_v1/data/trading_system_plan.csv \
            mobile_dashboard_v1/data/trading_system_summary.json \
            mobile_dashboard_v1/data/exit_risk_plan.csv \
            mobile_dashboard_v1/data/exit_risk_summary.json \
            mobile_dashboard_v1/data/final_action_plan.csv \
            mobile_dashboard_v1/data/final_action_summary.json \
            mobile_dashboard_v1/data/position_overlay.csv \
            mobile_dashboard_v1/data/position_overlay_debug.csv \
            mobile_dashboard_v1/data/position_overlay_summary.txt \
            mobile_dashboard_v1/data/manual_positions.csv || true

          git reset -- price_panel_daily.csv || true
          git reset -- feature_panel_daily.csv || true
          git reset -- raw_market_daily.csv || true
          git reset -- mobile_dashboard_v1/data/price_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/feature_panel_daily.csv || true
          git reset -- mobile_dashboard_v1/data/raw_market_daily.csv || true

          echo "==== staged files ===="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "no update"
          else
            git commit -m "update daily dashboard and position overlay"
            git push
          fi
